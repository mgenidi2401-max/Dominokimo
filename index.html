<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>DOMINO v9.3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Reem+Kufi:wght@400;700&family=Lateef:wght@400;700&display=swap');
:root{
  /* 4-color: Black · Royal Blue · Gold · White */
  --bg:#050508;--bg2:#08080f;--surface:#0e0e1a;--surface2:#131324;
  --border:rgba(212,168,71,.14);--border2:rgba(212,168,71,.25);
  --blue:#1a237e;--blue2:#283593;--blue3:#3949ab;
  --gold:#d4a847;--gold2:#ecc96d;--gold3:#f7e8b0;
  --red2:#e74c3c;
  --felt:#0a3818;--felt2:#040e08;
  --ivory:#f8f4ec;--pip:#050508;
  --text:#f5f0e8;--text2:#d4c8a8;--text3:#9080b0;
  --shadow:rgba(0,0,0,.85);
  --accent-glow:rgba(212,168,71,.35);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
[dir=rtl]{font-family:'Cairo',sans-serif}
#app{display:flex;flex-direction:column;height:100dvh;width:100%}

/* ── DESKTOP: full screen ── */
@media(min-width:900px){
  body{background:#050508}
  #app{max-width:100%;margin:0}
  /* Bigger tiles on desktop */
  .tile.V{width:44px;height:82px}
  .tile.H{width:82px;height:44px}
  .tile.DBL{width:40px;height:76px}
  .chain-t.H{width:68px;height:36px}
  .chain-t.V{width:36px;height:68px}
  .chain-t.DBL{width:36px;height:68px}
  .pip{width:7px;height:7px}
  .chain-t .pip{width:6px;height:6px}
  /* Bigger font sizes */
  #hadith-text{font-size:.88rem!important}
  #msg-bar{font-size:.82rem}
  .gbtn{font-size:.82rem;padding:11px 8px}
  #my-zone{min-height:90px}
  #hdr{padding:7px 16px}
  .brand-name{font-size:1.3rem}
}

/* ── TABLET ── */
@media(min-width:600px) and (max-width:899px){
  #app{max-width:100%}
  #hadith-text{font-size:.76rem!important}
}

/* ── MOBILE ── */
@media(max-width:599px){
  #app{max-width:100%}
}

/* ── LANDSCAPE MOBILE ── */
@media(orientation:landscape) and (max-height:500px){
  #hdr{padding:3px 10px}
  #opps-row{min-height:32px;padding:2px 10px}
  #my-zone{min-height:56px;padding:4px}
  .tile.V{width:28px;height:52px}
  .tile.H{width:52px;height:28px}
  .tile.DBL{width:26px;height:48px}
  #controls{padding:4px 7px 5px}
  .gbtn{padding:7px 4px;font-size:.66rem}
  #msg-bar{min-height:19px;font-size:.63rem}
  #info-bar,#hadith-bar{display:none!important}
}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}
#game{display:none;flex-direction:column;height:100%}
#game.active{display:flex}

/* ── LANDING ── */
#landing{background:radial-gradient(ellipse at 30% 0%,#1a237e 0%,#0d0d1a 40%,#050508 75%);
  align-items:center;justify-content:center;overflow-y:auto;padding:20px 16px 36px;position:relative}
#landing::before,#landing::after{content:'';position:fixed;width:100px;height:100px;border-color:var(--gold);border-style:solid;opacity:.1;pointer-events:none}
#landing::before{top:14px;left:14px;border-width:2px 0 0 2px}
#landing::after{bottom:14px;right:14px;border-width:0 2px 2px 0}
.landing-inner{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;gap:20px}

/* Logo */
.logo-wrap{text-align:center;animation:fadeDown .7s ease both}
.islamic-ornament{font-size:2.2rem;filter:drop-shadow(0 0 16px rgba(212,168,71,.5));animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 10px rgba(212,168,71,.3))}50%{filter:drop-shadow(0 0 24px rgba(212,168,71,.8))}}
.game-name{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,7vw,3rem);font-weight:900;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.game-sub{font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-top:5px}
.version-tag{display:inline-block;font-size:.52rem;letter-spacing:2px;color:var(--gold);border:1px solid rgba(212,168,71,.3);border-radius:20px;padding:2px 8px;margin-top:6px}

/* Quote */
.quote-strip{width:100%;background:linear-gradient(135deg,rgba(26,35,126,.15),rgba(212,168,71,.04));border:1px solid rgba(212,168,71,.2);border-radius:18px;padding:22px 22px;text-align:center;position:relative;overflow:hidden;min-height:110px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 0 30px rgba(26,35,126,.2)}
.quote-strip::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(212,168,71,.04));pointer-events:none}
/* Quote text animations */
.quote-ar{font-size:1.4rem;color:rgba(212,168,71,.95);line-height:2;margin-bottom:8px;transition:all .4s;white-space:pre-line;text-shadow:0 0 20px rgba(212,168,71,.3)}
.quote-ar.font-amiri{font-family:'Amiri',serif;font-size:1.5rem}
.quote-ar.font-scheherazade{font-family:'Scheherazade New',serif;font-size:1.6rem}
.quote-ar.font-lateef{font-family:'Lateef',serif;font-size:1.7rem}
.quote-ar.font-kufi{font-family:'Reem Kufi',sans-serif;font-size:1.3rem;letter-spacing:1px}
.quote-author{font-size:.78rem;color:rgba(212,168,71,.5);letter-spacing:2px;font-family:'Cairo',sans-serif;margin-top:4px}
/* Direction variations */
.quote-ar.dir-center{text-align:center}
.quote-ar.dir-right{text-align:right}
.quote-ar.dir-left{text-align:left}
/* Entrance animations */
@keyframes qFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes qSlideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes qSlideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes qZoomIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes qDropIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes qSparkle{0%{opacity:0;filter:blur(4px)}40%{opacity:1;filter:blur(0)}70%{opacity:1}100%{opacity:.92;filter:blur(0)}}
.q-anim-fade{animation:qFadeIn .8s ease both}
.q-anim-right{animation:qSlideRight .7s ease both}
.q-anim-left{animation:qSlideLeft .7s ease both}
.q-anim-zoom{animation:qZoomIn .6s cubic-bezier(.34,1.56,.64,1) both}
.q-anim-drop{animation:qDropIn .6s ease both}
.q-anim-sparkle{animation:qSparkle 1.2s ease both}

/* Language */
.lang-selector{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;animation:fadeUp .7s .1s ease both}
.lang-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:8px 14px;font-family:inherit;cursor:pointer;transition:all .2s;touch-action:manipulation}
.lang-btn:hover,.lang-btn.active{border-color:var(--gold);background:rgba(212,168,71,.1)}
.lang-flag{font-size:1.3rem;flex-shrink:0}
.lang-labels{display:flex;flex-direction:column}
.lang-l1{font-size:.8rem;font-weight:700;color:var(--text);line-height:1.2}
.lang-l2{font-size:.56rem;color:var(--text3);line-height:1.2}
.lang-btn.active .lang-l1{color:var(--gold)}
.lang-btn.active .lang-l2{color:rgba(212,168,71,.6)}

/* Main card */
.main-card{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:24px 20px;width:100%;box-shadow:0 16px 50px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);animation:fadeUp .7s .15s ease both}
.name-label{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.name-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 15px;font-family:inherit;font-size:.95rem;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:16px}
.name-input:focus{border-color:var(--gold)}
.name-input::placeholder{color:var(--text3)}
.pbtn{width:100%;font-family:'Inter',sans-serif;border:none;border-radius:11px;padding:13px;font-size:.85rem;font-weight:600;letter-spacing:.6px;cursor:pointer;transition:all .2s;margin-bottom:9px;text-transform:uppercase;touch-action:manipulation}
.pbtn.primary{background:linear-gradient(135deg,var(--gold),#a8822a);color:#0d1a26;box-shadow:0 4px 16px rgba(212,168,71,.28)}
.pbtn.primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,168,71,.38)}
.pbtn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.divider-line{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text3);font-size:.6rem;letter-spacing:2px;text-transform:uppercase}
.divider-line::before,.divider-line::after{content:'';flex:1;height:1px;background:var(--border)}
.join-row{display:flex;gap:8px}
.code-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;font-family:'Inter',monospace;font-size:.95rem;font-weight:700;letter-spacing:5px;color:var(--gold2);outline:none;text-transform:uppercase;transition:border-color .2s;text-align:center}
.code-input:focus{border-color:var(--gold)}
.code-input::placeholder{color:var(--text3);letter-spacing:2px;font-weight:400}
.pbtn.join-btn{background:var(--surface2);color:var(--gold);border:1px solid rgba(212,168,71,.28);border-radius:10px;padding:11px 16px;width:auto;font-size:.8rem;margin:0}
#lobby-err{color:var(--red2);font-size:.7rem;text-align:center;min-height:16px;margin-top:3px}

/* ── OPTIONAL FEATURES — icon grid ── */
.features-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px 16px;width:100%;animation:fadeUp .7s .25s ease both}
.features-title{font-size:.56rem;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;text-align:center}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.feat-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:10px 6px;cursor:pointer;transition:all .2s;touch-action:manipulation;font-family:inherit}
.feat-btn:hover{border-color:var(--gold);background:rgba(212,168,71,.08)}
.feat-btn.active{border-color:var(--gold);background:rgba(212,168,71,.12)}
.feat-icon{font-size:1.4rem;line-height:1}
.feat-name{font-size:.55rem;color:var(--text3);text-align:center;line-height:1.2}
.feat-btn.active .feat-name{color:var(--gold2)}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── WAITING ── */
#waiting{background:var(--bg2);align-items:center;justify-content:center;padding:28px 18px;text-align:center}
.waiting-inner{width:100%;max-width:360px}
.wait-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold2);margin-bottom:5px}
.wait-sub{font-size:.72rem;color:var(--text3);margin-bottom:20px}
.code-display{font-family:'Inter',monospace;font-size:2.2rem;font-weight:900;letter-spacing:10px;color:var(--text);background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:13px 24px;margin:0 auto 20px;width:fit-content}
.players-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:16px}
.player-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:5px 13px;font-size:.74rem;color:var(--text2)}
.player-pill.me{border-color:var(--gold);color:var(--gold)}
.player-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.player-pill.me .player-dot{background:var(--gold)}
.wait-actions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.wbtn{font-family:inherit;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:8px 16px;font-size:.74rem;color:var(--text2);cursor:pointer;touch-action:manipulation;transition:all .2s}
.wbtn.gold{background:linear-gradient(135deg,var(--gold),#a8822a);color:#0d1a26;font-weight:700;border:none;display:none}
.wbtn.danger{color:var(--red2);border-color:rgba(231,76,60,.3)}

/* ── GAME HEADER ── */
#info-bar{background:rgba(14,20,30,.95);border-bottom:1px solid rgba(212,168,71,.08);padding:3px 10px;flex-shrink:0;display:none;align-items:center;gap:10px;min-height:27px;overflow:hidden}
#info-bar.visible{display:flex}
#prayer-mini{display:flex;gap:7px;align-items:center;flex:1;overflow:hidden}
.pm-item{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.pm-name{font-size:.42rem;color:var(--text3);line-height:1}
.pm-time{font-size:.6rem;font-weight:600;color:var(--gold)}
.pm-item.next .pm-name{color:#4caf50}
.pm-item.next .pm-time{color:#4caf50}
#weather-mini{display:flex;align-items:center;gap:4px;flex-shrink:0;font-size:.6rem;color:var(--text2);white-space:nowrap}
#hadith-bar{background:rgba(14,20,30,.88);border-bottom:1px solid rgba(212,168,71,.05);padding:4px 16px;flex-shrink:0;display:none;align-items:center;justify-content:center;min-height:30px}
#hadith-bar.visible{display:flex}
#hadith-text{font-size:.8rem;color:rgba(212,168,71,.75);text-align:center;font-style:italic}
[dir=rtl] #hadith-text{font-family:'Amiri',serif;font-size:.9rem}
#hdr{background:linear-gradient(180deg,#0e0e1a,#050508);border-bottom:1px solid rgba(212,168,71,.15);padding:env(safe-area-inset-top,0px) 12px 6px;padding-top:max(env(safe-area-inset-top,0px),8px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.brand-name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--gold);letter-spacing:3px;text-shadow:0 0 12px rgba(212,168,71,.5)}
.brand-v{font-size:.46rem;color:var(--text3)}

/* In-game feature icons in header */
.hdr-feats{display:flex;gap:5px;align-items:center}
.hdr-feat{background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:8px;padding:5px 8px;font-size:1.1rem;cursor:pointer;transition:all .15s;touch-action:manipulation;line-height:1;min-width:34px;text-align:center}
.hdr-feat.on{border-color:var(--gold);background:rgba(212,168,71,.18);box-shadow:0 0 8px rgba(212,168,71,.3)}
.hdr-feat:hover{border-color:var(--text2)}

.scores-row{display:flex;gap:5px}
.sbox{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:2px 7px;text-align:center;min-width:48px}
.sbox .sl{font-size:.5rem;color:var(--text3);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px}
.sbox .sv{font-size:.86rem;font-weight:700;color:var(--gold2);line-height:1.2}
.sbox.myturn{border-color:rgba(212,168,71,.4);box-shadow:0 0 8px rgba(212,168,71,.12)}
#opps-row{background:rgba(8,14,20,.55);border-bottom:1px solid var(--border);padding:3px 11px;flex-shrink:0;display:flex;gap:10px;flex-wrap:wrap;min-height:42px;align-items:center}
.opp-info{display:flex;flex-direction:column;align-items:center;gap:1px}
.opp-name{font-size:.53rem;color:var(--text3);white-space:nowrap}
.opp-tiles-row{display:flex;gap:2px}
.back-tile{width:11px;height:20px;background:linear-gradient(135deg,var(--surface2),var(--surface));border-radius:3px;border:1px solid rgba(212,168,71,.08)}
.wait-badge{font-size:.5rem;background:rgba(21,101,192,.18);border:1px solid rgba(21,101,192,.25);border-radius:7px;padding:2px 6px;color:#90caf9}

/* ── FELT TABLE — snake chain ── */
#table-wrap{flex:1;overflow:hidden;position:relative;
  background:radial-gradient(ellipse at 50% 50%,#134f1e 0%,var(--felt) 55%,var(--felt2) 100%)}
#table-wrap::before{content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.013) 0,rgba(255,255,255,.013) 1px,transparent 1px,transparent 28px),
  repeating-linear-gradient(90deg,rgba(255,255,255,.013) 0,rgba(255,255,255,.013) 1px,transparent 1px,transparent 28px);
  pointer-events:none}
#table-wrap::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 50px rgba(0,0,0,.45);pointer-events:none;z-index:0}

/* Table scroll — fills entire felt area */
#table-scroll{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;z-index:1;padding:8px;display:flex;align-items:center;justify-content:center}

/* Chain wrap — centers chain when short, grows from middle */
#chain-wrap{display:flex;flex-direction:column;gap:4px;width:100%;align-self:center;}

/* ── UNDO BAR ── */
#undo-bar{display:none;position:absolute;bottom:0;left:0;right:0;background:rgba(10,18,28,.96);border-top:1.5px solid var(--red2);padding:6px 12px;z-index:30;align-items:center;gap:10px}
#undo-bar.show{display:flex}
#undo-text{font-size:.72rem;color:var(--text);white-space:nowrap}
#undo-prog{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
#undo-fill{height:100%;background:var(--red2);width:100%;transition:width linear}
#btn-undo{font-family:inherit;background:var(--red2);color:#fff;border:none;border-radius:7px;padding:6px 13px;font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation;pointer-events:all}

/* ── MSG BAR ── */
#msg-bar{padding:4px 12px;text-align:center;font-size:.7rem;font-weight:500;color:var(--gold2);background:rgba(10,18,28,.82);min-height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-top:1px solid var(--border);letter-spacing:.3px}

/* ── MY HAND ── */
#my-zone{background:rgba(10,18,28,.88);border-top:1px solid var(--border);padding:6px 7px;flex-shrink:0;min-height:74px}
#my-hand{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;align-items:flex-end}

/* ── CONTROLS ── */
#controls{display:flex;gap:5px;padding:6px 8px 8px;background:var(--bg2);flex-shrink:0;border-top:1px solid var(--border)}
.gbtn{flex:1;font-family:inherit;border:none;border-radius:9px;padding:9px 5px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;touch-action:manipulation;letter-spacing:.3px;text-transform:uppercase}
#btn-draw{background:var(--surface2);color:var(--gold);border:1px solid rgba(212,168,71,.2)}
#btn-draw:disabled{opacity:.22;pointer-events:none}
#btn-chat-toggle{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);position:relative}
#btn-chat-toggle.has-new::after{content:'';position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red2);border-radius:50%}
#btn-leave{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border);flex:.55}

/* ── TILES ── */
.tile{background:var(--ivory);border-radius:6px;border:1.5px solid #d0c5b0;box-shadow:1px 3px 8px var(--shadow),inset 0 1px 0 rgba(255,255,255,.8);display:inline-flex;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .15s;position:relative;flex-shrink:0;touch-action:manipulation}
/* ── TILES — responsive per device ── */
/* Mobile small (≤380px) */
.tile.V{flex-direction:column;width:34px;height:64px}
.tile.H{flex-direction:row;width:64px;height:34px}
.tile.DBL{flex-direction:column;width:32px;height:60px}
.chain-t{cursor:default;pointer-events:none}
.chain-t.H{width:54px;height:28px;flex-direction:row}
.chain-t.V{width:28px;height:54px;flex-direction:column}
.chain-t.DBL{width:28px;height:54px;flex-direction:column}
.pip{width:5px;height:5px}
.chain-t .pip{width:4px;height:4px}

/* Mobile normal (381–599px) */
@media(min-width:381px) and (max-width:599px){
  .tile.V{width:40px;height:76px}
  .tile.H{width:76px;height:40px}
  .tile.DBL{width:38px;height:72px}
  .chain-t.H{width:62px;height:32px}
  .chain-t.V{width:32px;height:62px}
  .chain-t.DBL{width:32px;height:62px}
  .pip{width:6px;height:6px}
  .chain-t .pip{width:5px;height:5px}
}

/* Tablet (600–899px) */
@media(min-width:600px) and (max-width:899px){
  .tile.V{width:48px;height:92px}
  .tile.H{width:92px;height:48px}
  .tile.DBL{width:46px;height:88px}
  .chain-t.H{width:76px;height:40px}
  .chain-t.V{width:40px;height:76px}
  .chain-t.DBL{width:40px;height:76px}
  .pip{width:7px;height:7px}
  .chain-t .pip{width:6px;height:6px}
}

/* Desktop (≥900px) */
@media(min-width:900px){
  .tile.V{width:58px;height:112px}
  .tile.H{width:112px;height:58px}
  .tile.DBL{width:56px;height:108px}
  .chain-t.H{width:94px;height:50px}
  .chain-t.V{width:50px;height:94px}
  .chain-t.DBL{width:50px;height:94px}
  .pip{width:9px;height:9px}
  .chain-t .pip{width:8px;height:8px}
}

/* Landscape mobile */
@media(orientation:landscape) and (max-height:500px){
  .tile.V{width:28px;height:52px}
  .tile.H{width:52px;height:28px}
  .tile.DBL{width:26px;height:48px}
  .chain-t.H{width:44px;height:22px}
  .chain-t.V{width:22px;height:44px}
  .chain-t.DBL{width:22px;height:44px}
  .pip{width:4px;height:4px}
  .chain-t .pip{width:3px;height:3px}
}
.chain-t.pending{border-color:var(--gold)!important;box-shadow:0 0 12px rgba(212,168,71,.6)!important;animation:pendPulse 1s ease-in-out infinite}
@keyframes pendPulse{0%,100%{box-shadow:0 0 8px rgba(212,168,71,.4)}50%{box-shadow:0 0 18px rgba(212,168,71,.9)}}
.tile:hover{transform:translateY(-6px);box-shadow:1px 8px 16px var(--shadow)}
.tile.dim{opacity:.22;cursor:not-allowed}
.tile.dim:hover{transform:none;box-shadow:1px 3px 8px var(--shadow)}
.half{flex:1;display:flex;align-items:center;justify-content:center}
.tile.V .half:first-child,.tile.DBL .half:first-child{border-bottom:1.5px solid #c0b098}
.tile.H .half:first-child,.chain-t.H .half:first-child{border-right:1.5px solid #c0b098}
.chain-t.V .half:first-child,.chain-t.DBL .half:first-child{border-bottom:1.5px solid #c0b098}
.pip-grid{display:grid;width:100%;height:100%;padding:3px;gap:1px}
.pip{width:7px;height:7px;background:var(--pip);border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,.5);justify-self:center;align-self:center}
.chain-t .pip{width:6px;height:6px}
.pip-grid[data-n="0"]{grid-template:1fr/1fr}
.pip-grid[data-n="1"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="2"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="3"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="4"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="5"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="6"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}

/* Drop zones */
.drop-zone{min-width:40px;height:40px;border:2px dashed rgba(212,168,71,.25);border-radius:9px;display:flex;align-items:center;justify-content:center;color:rgba(212,168,71,.4);font-size:1.1rem;transition:all .18s;flex-shrink:0;cursor:pointer}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--gold);background:rgba(212,168,71,.1);transform:scale(1.08);color:var(--gold)}

/* ── CHAT ── */
#chat-panel{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:var(--bg)}
#chat-panel.show{display:flex}
#chat-header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:10px 13px;display:flex;align-items:center;gap:9px;flex-shrink:0}
#chat-header h3{flex:1;font-size:.88rem;color:var(--gold2);letter-spacing:1px}
#btn-chat-close{background:none;border:none;color:var(--text3);font-size:1.1rem;cursor:pointer;touch-action:manipulation}
.chat-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-tab{flex:1;padding:8px;font-family:inherit;font-size:.73rem;font-weight:600;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;touch-action:manipulation;position:relative}
.chat-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-badge{position:absolute;top:5px;right:8px;width:7px;height:7px;background:var(--red2);border-radius:50%;display:none}
.tab-badge.show{display:block}
#chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
#chat-messages::-webkit-scrollbar{width:3px}
#chat-messages::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
.msg{max-width:76%;display:flex;flex-direction:column;gap:2px}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg.system{align-self:center;align-items:center;max-width:90%}
.msg-sender{font-size:.56rem;color:var(--text3);margin-bottom:1px}
.msg-bubble{padding:7px 11px;border-radius:13px;font-size:.8rem;line-height:1.4;word-break:break-word}
.msg.mine .msg-bubble{background:rgba(212,168,71,.14);border:1px solid rgba(212,168,71,.2);color:var(--text);border-radius:13px 13px 3px 13px}
.msg.other .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:13px 13px 13px 3px}
.msg.system .msg-bubble{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text3);font-size:.66rem;border-radius:9px;font-style:italic}
.msg-time{font-size:.5rem;color:var(--text3)}
#chat-input-row{display:flex;gap:7px;padding:9px 11px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
#chat-input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:.82rem;color:var(--text);outline:none;user-select:text}
#chat-input:focus{border-color:var(--gold)}
#chat-input::placeholder{color:var(--text3)}
#btn-send-chat{background:linear-gradient(135deg,var(--gold),#a8822a);color:#0d1a26;border:none;border-radius:9px;padding:9px 14px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;touch-action:manipulation}

/* ── AUDIO PLAYER ── */
#audio-player{width:100%;background:linear-gradient(135deg,rgba(5,5,8,.98),rgba(8,8,20,.95));border-bottom:1px solid rgba(212,168,71,.2);padding:5px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:5;min-height:38px}
/* no .show needed — always visible in game */
#ap-icon{font-size:1.1rem;flex-shrink:0}
#ap-info{flex:1;min-width:0}
#ap-title{font-size:.7rem;color:var(--gold2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
#ap-sub{font-size:.55rem;color:var(--text3)}
#ap-controls{display:flex;align-items:center;gap:7px;flex-shrink:0}
.ap-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:3px;touch-action:manipulation;transition:color .15s}
.ap-btn:hover{color:var(--gold)}
#ap-vol{width:55px;accent-color:var(--gold);cursor:pointer}
/* audio player is now inline */

/* ── NOTIFICATIONS ── */
#prayer-notify{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(6px)}
#prayer-notify.show{display:flex}
#prayer-box{background:linear-gradient(160deg,var(--surface2),var(--bg2));border:1.5px solid rgba(212,168,71,.38);border-radius:18px;padding:26px 32px;text-align:center;max-width:255px;width:88%;box-shadow:0 0 45px rgba(212,168,71,.18);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.p-icon{font-size:2rem}
.p-name{font-family:'Amiri',serif;font-size:1.5rem;color:var(--gold2);margin:8px 0 3px}
.p-time{font-size:.86rem;color:var(--text);margin-bottom:12px}
.p-msg{font-size:.66rem;color:var(--text3);margin-bottom:14px}
#btn-close-prayer{background:linear-gradient(135deg,var(--gold),#a8822a);color:#0d1a26;border:none;border-radius:9px;padding:9px 22px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;touch-action:manipulation;pointer-events:all}
#weather-toast{position:fixed;top:13px;left:50%;transform:translateX(-50%);z-index:301;display:none;min-width:200px;max-width:88%}
#weather-toast.show{display:block;animation:slideDown .4s ease}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-13px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#wt-inner{background:linear-gradient(135deg,var(--surface2),var(--bg2));border:1px solid rgba(100,180,255,.22);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:9px;box-shadow:0 8px 26px rgba(0,0,0,.55)}
.wt-icon{font-size:1.4rem}.wt-info{flex:1}.wt-title{font-size:.72rem;font-weight:600;color:#90caf9}.wt-sub{font-size:.58rem;color:var(--text3)}
#btn-close-wt{background:none;border:none;color:var(--text3);font-size:.85rem;cursor:pointer;pointer-events:all;touch-action:manipulation}

/* ── WIN ── */
#win-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#win-bg.show{display:flex}
#win-box{background:linear-gradient(160deg,var(--surface2),var(--bg2));border:1.5px solid rgba(212,168,71,.32);border-radius:20px;padding:32px 36px;text-align:center;max-width:290px;width:88%;box-shadow:0 0 55px rgba(212,168,71,.12);animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#win-emoji{font-size:2.5rem;margin-bottom:7px}
#win-title{font-family:'Playfair Display',serif;font-size:1.65rem;color:var(--gold2);margin-bottom:3px}
[dir=rtl] #win-title{font-family:'Amiri',serif}
#win-sub{font-size:.76rem;color:var(--text3);margin-bottom:19px}
.wwin-btn{width:100%;font-family:inherit;border:none;border-radius:10px;padding:11px;font-size:.82rem;font-weight:600;cursor:pointer;touch-action:manipulation;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.wwin-btn.gold{background:linear-gradient(135deg,var(--gold),#a8822a);color:#0d1a26}
.wwin-btn.ghost{background:transparent;color:var(--text3);border:1px solid var(--border2)}

.spin{display:inline-block;width:9px;height:9px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
#table-scroll::-webkit-scrollbar{height:4px;width:4px}
#table-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}



/* ── WOW VISUALS ── */
.islamic-ornament{font-size:2.4rem;filter:drop-shadow(0 0 20px rgba(212,168,71,.6));animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 12px rgba(212,168,71,.4))}50%{filter:drop-shadow(0 0 32px rgba(212,168,71,1))}}
.game-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.4rem,8vw,3.4rem);
  font-weight:900;letter-spacing:8px;text-transform:uppercase;
  background:linear-gradient(135deg,#a06010 0%,var(--gold) 30%,var(--gold3) 55%,var(--gold) 80%,#a06010 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite;
  line-height:1;
}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.mk-tag{font-size:.75rem;letter-spacing:8px;color:rgba(212,168,71,.45);font-family:'Playfair Display',serif;margin-top:2px;font-weight:700;text-shadow:0 0 8px rgba(212,168,71,.3)}

/* Starfield background */
#landing::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 42% 8%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 30%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 15%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 60%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 75%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 5% 90%,rgba(212,168,71,.3) 0%,transparent 100%),
    radial-gradient(2px 2px at 80% 5%,rgba(212,168,71,.2) 0%,transparent 100%);
  pointer-events:none;
  opacity:.8;
}
#landing::after{bottom:14px;right:14px;border-width:0 2px 2px 0}

/* Glow border on main card */
.main-card{
  background:linear-gradient(160deg,rgba(14,14,26,.98),rgba(8,8,15,.98));
  border:1px solid rgba(212,168,71,.25);
  border-radius:18px;padding:24px 20px;width:100%;
  box-shadow:0 0 0 1px rgba(26,35,126,.3),0 0 40px rgba(26,35,126,.2),0 20px 60px rgba(0,0,0,.9),inset 0 1px 0 rgba(212,168,71,.08);
  animation:fadeUp .7s .15s ease both;
}
.features-card{
  background:linear-gradient(160deg,#1a1a1a,#111);
  border:1px solid rgba(212,168,71,.15);
  border-radius:16px;padding:15px 16px;width:100%;
  animation:fadeUp .7s .25s ease both;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
.feat-btn{
  background:linear-gradient(145deg,#1e1e1e,#141414);
  border:1.5px solid rgba(212,168,71,.18);border-radius:12px;
  padding:12px 6px;cursor:pointer;transition:all .2s;touch-action:manipulation;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.feat-btn:hover{border-color:rgba(212,168,71,.5);background:rgba(212,168,71,.08);transform:translateY(-2px)}
.feat-btn.active{border-color:var(--gold);background:rgba(212,168,71,.12);box-shadow:0 0 12px rgba(212,168,71,.25)}
.feat-icon{font-size:1.6rem;line-height:1}
.feat-name{font-size:.6rem;color:var(--text3);text-align:center;line-height:1.2}
.feat-btn.active .feat-name{color:var(--gold2)}

</style>
</head>
<body>
<div id="app">

<!-- LANDING -->
<div id="landing" class="screen active">
<div class="landing-inner">
  <div class="logo-wrap">
    <div class="islamic-ornament">✦ ☽ ✦</div>
    <div class="game-name">DOMINO</div>
    <div class="mk-tag">MK</div>
    <div class="game-sub" id="game-sub-text">متعدد اللاعبين · كلاسيكي · عالمي</div>
    <div class="version-tag">v9.3</div>
  </div>
  <div class="quote-strip"><div class="quote-ar" id="quote-ar-text"></div><div class="quote-author" id="quote-author-text"></div></div>
  <div class="lang-selector">
    <button class="lang-btn" id="lang-en"><span class="lang-flag">🌐</span><span class="lang-labels"><span class="lang-l1">English</span><span class="lang-l2">الإنجليزية</span></span></button>
    <button class="lang-btn active" id="lang-ar"><span class="lang-flag">🇪🇬</span><span class="lang-labels"><span class="lang-l1">العربية</span><span class="lang-l2">Arabic</span></span></button>
    <button class="lang-btn" id="lang-fr"><span class="lang-flag">🇫🇷</span><span class="lang-labels"><span class="lang-l1">Français</span><span class="lang-l2">الفرنسية</span></span></button>
  </div>
  <div class="main-card">
    <div class="name-label" id="lbl-name">اسمك</div>
    <input class="name-input" id="inp-name" placeholder="اكتب اسمك…" maxlength="14" autocomplete="off">
    <button class="pbtn primary" id="btn-create">+ <span id="lbl-create">إنشاء غرفة</span></button>
    <button class="pbtn secondary" id="btn-vs-ai">🤖 <span id="lbl-vsai">العب ضد الكمبيوتر</span></button>
    <div class="divider-line"><span id="lbl-or">أو انضم</span></div>
    <div class="join-row">
      <input class="code-input" id="inp-code" placeholder="الكود" maxlength="6" autocomplete="off">
      <button class="pbtn join-btn" id="btn-join"><span id="lbl-join">انضم ←</span></button>
    </div>
    <div id="lobby-err"></div>
  </div>
  <div class="features-card">
    <div class="features-title" id="lbl-features">مميزات إضافية</div>
    <div class="feat-grid">
      <button class="feat-btn" id="tog-prayer"><span class="feat-icon">🕌</span><span class="feat-name" id="lbl-pf">الصلاة</span></button>
      <button class="feat-btn" id="tog-hadith"><span class="feat-icon">📿</span><span class="feat-name" id="lbl-hf">الحديث</span></button>
      <button class="feat-btn" id="tog-weather"><span class="feat-icon">🌤️</span><span class="feat-name" id="lbl-wf">الطقس</span></button>
      <button class="feat-btn" id="tog-audio"><span class="feat-icon">🎵</span><span class="feat-name" id="lbl-af">الصوت</span></button>
    </div>
  </div>
</div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
<div class="waiting-inner">
  <div class="wait-title" id="lbl-wait-title">في انتظار اللاعبين</div>
  <div class="wait-sub" id="lbl-wait-sub">ابعت الكود 📲</div>
  <div class="code-display" id="room-code-display">——</div>
  <div class="players-grid" id="players-list"></div>
  <div class="wait-sub" style="margin-bottom:14px" id="lbl-wait-hint">من ٢ لـ ٦ لاعبين — صاحب الغرفة يبدأ</div>
  <div class="wait-actions">
    <button class="wbtn gold" id="btn-start-game">▶ ابدأ</button>
    <button class="wbtn" id="btn-copy-code">📋 نسخ</button>
    <button class="wbtn danger" id="btn-cancel-wait">✕ إلغاء</button>
  </div>
</div>
</div>

<!-- GAME -->
<div id="game">
  <div id="info-bar">
    <div id="prayer-mini"></div>
    <div id="weather-mini"><span id="wm-icon">🌤️</span><span id="wm-temp">--°</span><span id="wm-desc" style="margin-left:3px"></span><span id="city-mini" style="font-size:.44rem;color:var(--text3);margin-left:3px"></span></div>
  </div>
  <div id="hadith-bar"><div id="hadith-text">—</div></div>
  <!-- IN-GAME POETRY TICKER -->
  <div id="poetry-bar" style="display:none;background:linear-gradient(135deg,rgba(0,0,0,.92),rgba(10,10,10,.88));border-bottom:1px solid rgba(212,168,71,.08);padding:5px 16px;flex-shrink:0;align-items:center;justify-content:center;min-height:34px;overflow:hidden;position:relative">
    <div id="poetry-text" style="font-size:1.15rem;color:rgba(212,168,71,.92);text-align:center;line-height:1.8;font-family:'Scheherazade New',serif;white-space:pre-line;transition:all .5s;text-shadow:0 0 15px rgba(212,168,71,.3)"></div>
    <div id="poetry-author" style="font-size:.7rem;color:rgba(212,168,71,.5);text-align:center;letter-spacing:2px;margin-top:4px;font-family:'Cairo',sans-serif"></div>
  </div>
  <div id="hdr">
    <div class="hdr-left">
      <span class="brand-name">DOMINO</span>
      <span class="brand-v">v9.3</span>
      <span style="font-size:.6rem;letter-spacing:3px;color:rgba(212,168,71,.4);font-family:'Playfair Display',serif">MK</span>
      <!-- In-game feature icons -->
      <div class="hdr-feats">
        <button class="hdr-feat" id="hf-prayer" title="مواقيت الصلاة">🕌</button>
        <button class="hdr-feat" id="hf-hadith" title="الحديث">📿</button>
        <button class="hdr-feat" id="hf-weather" title="الطقس">🌤️</button>
        <button class="hdr-feat" id="hf-audio" title="الصوت">🎵</button>
        <!-- HOME BUTTON -->
        <button class="hdr-feat" id="btn-home" title="الرئيسية" style="color:var(--red2);border-color:rgba(231,76,60,.3)">🏠</button>
      </div>
    </div>
    <div class="scores-row" id="scores-row"></div>
  </div>
  <div id="opps-row"></div>
  <div id="table-wrap">
    <div id="table-scroll">
      <div id="chain-wrap"><div id="chain"></div></div>
    </div>
    <div id="undo-bar">
      <span id="undo-text">Undo?</span>
      <div id="undo-prog"><div id="undo-fill"></div></div>
      <button id="btn-undo">↩ تراجع</button>
    </div>
  </div>
  <div id="msg-bar">Loading…</div>
  <div id="my-zone"><div id="my-hand"></div></div>

function applyBgColor(bg){
  const root=document.documentElement.style;
  root.setProperty('--bg',bg);

  Object.entries(pair).forEach(([k,v])=>root.setProperty(k,v));
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('active',s.dataset.bg===bg));

}

let qIdx=Math.floor(Math.random()*QUOTES.length);
const Q_ANIMS=['q-anim-fade','q-anim-right','q-anim-left','q-anim-zoom','q-anim-drop','q-anim-sparkle'];
const Q_DIRS=['dir-center','dir-right','dir-right','dir-center','dir-right','dir-left'];
const Q_FONTS={'Amiri':'font-amiri','Scheherazade New':'font-scheherazade','Lateef':'font-lateef','Reem Kufi':'font-kufi'};

function morphText(el, newText, duration=600){
  // Split to chars, animate each out then in
  const old=el.textContent||'';
  if(!old){el.textContent=newText;return;}
  el.style.transition=`opacity ${duration/2}ms ease, transform ${duration/2}ms ease, filter ${duration/2}ms ease`;
  el.style.opacity='0';
  el.style.transform='translateY(-8px)';
  el.style.filter='blur(3px)';
  setTimeout(()=>{
    el.textContent=newText;
    el.style.transform='translateY(8px)';
    requestAnimationFrame(()=>{
      el.style.opacity='1';
      el.style.transform='translateY(0)';
      el.style.filter='blur(0)';
    });
  },duration/2);
}

function showQuote(){
  const q=QUOTES[qIdx%QUOTES.length];
  const arEl=document.getElementById('quote-ar-text');
  const auEl=document.getElementById('quote-author-text');
  if(!arEl)return;

  // Pick random animation & direction
  const animIdx=Math.floor(Math.random()*Q_ANIMS.length);
  const anim=Q_ANIMS[animIdx];
  const dir=Q_DIRS[animIdx];
  const fontClass=Q_FONTS[q.font]||'font-amiri';

  // Remove all old classes
  arEl.className='quote-ar '+fontClass+' '+dir;

  // Morph animation
  morphText(arEl, (q.type==='poetry'?'':' ❝ ')+q.ar+(q.type==='poetry'?'':' ❞ '), 700);
  setTimeout(()=>{
    arEl.classList.add(anim);
    // Remove animation class after it plays
    setTimeout(()=>arEl.classList.remove(anim),1200);
  },400);

  if(auEl){
    const typeLabel=q.type==='poetry'?'🖋 ':q.type==='proverb'?'📜 ':'';
    morphText(auEl, '— '+typeLabel+q.auth, 500);
  }
  qIdx++;
}

showQuote();

}

function playTileSound(){try{const ctx=getAudio();if(ctx.state==='suspended')ctx.resume();const now=ctx.currentTime;const buf=ctx.createBuffer(1,ctx.sampleRate*.06,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);const src=ctx.createBufferSource();src.buffer=buf;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=2.5;const g=ctx.createGain();g.gain.setValueAtTime(.6,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);src.connect(bp);bp.connect(g);g.connect(ctx.destination);src.start(now);src.stop(now+.1);const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(180,now);osc.frequency.exponentialRampToValueAtTime(90,now+.07);const og=ctx.createGain();og.gain.setValueAtTime(.3,now);og.gain.exponentialRampToValueAtTime(.001,now+.12);osc.connect(og);og.connect(ctx.destination);osc.start(now);osc.stop(now+.13);}catch(e){}}
function playWinSound(){try{const ctx=getAudio();if(ctx.state==='suspended')ctx.resume();const now=ctx.currentTime;[0,.12,.24,.38].forEach((t,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.value=[523,659,784,1047][i];g.gain.setValueAtTime(.22,now+t);g.gain.exponentialRampToValueAtTime(.001,now+t+.2);o.connect(g);g.connect(ctx.destination);o.start(now+t);o.stop(now+t+.22);});}catch(e){}}

function apLoad(idx){
  if(apMode==='url'&&apUserUrls.length>0){
    const u=apUserUrls[idx%apUserUrls.length];apIdx=idx%apUserUrls.length;
    document.getElementById('ap-icon').textContent='🎵';
    document.getElementById('ap-title').textContent=u.name||'ملف صوتي';
    document.getElementById('ap-sub').textContent=u.url.includes('radiojar')?'Radio Stream':'Cloud/URL';
    apAudio.src=u.url;apAudio.play().catch(()=>{});
  } else if(apMode==='file'&&apUserFiles.length>0){
    const f=apUserFiles[idx%apUserFiles.length];apIdx=idx%apUserFiles.length;
    document.getElementById('ap-icon').textContent='🎵';
    document.getElementById('ap-title').textContent=f.name.replace(/\.[^.]+$/,'');
    document.getElementById('ap-sub').textContent='ملف محلي';
    apAudio.src=URL.createObjectURL(f);apAudio.play().catch(()=>{});
  } else {
    // Quran/Radio streams (default)
    apMode='quran';
    const s=QSTREAMS[idx%QSTREAMS.length];apIdx=idx%QSTREAMS.length;
    document.getElementById('ap-icon').textContent=s.icon;
    document.getElementById('ap-title').textContent=s.title;
    document.getElementById('ap-sub').textContent=s.sub;
    const lbl=document.getElementById('ap-stream-label');if(lbl)lbl.textContent=s.label||'';
    // Try main URL, fallback to urlAlt if error
    apAudio.src=s.url;
    apAudio.play().catch(()=>{
      if(s.urlAlt){apAudio.src=s.urlAlt;apAudio.play().catch(()=>{})}
    });
    // Show label on icon button in player
    const iconEl=document.getElementById('ap-icon');
    if(iconEl)iconEl.title=s.label||s.title;
  }
}
function apLoadUrl(url,name){
  // Convert OneDrive share links to direct download
  let directUrl=url;
  if(url.includes('1drv.ms')||url.includes('onedrive.live.com')){
    // OneDrive: replace view with download
    directUrl=url.replace('redir?','download?').replace('&action=view','')
      .replace('embed?','download?');
    if(!directUrl.includes('download'))
      directUrl=url+'&download=1';
  }
  if(url.includes('drive.google.com')){
    // Google Drive: extract file ID and make direct link
    const m=url.match(/[-\w]{25,}/);
    if(m)directUrl=`https://drive.google.com/uc?export=download&id=${m[0]}`;
  }
  apUserUrls.push({url:directUrl,name:name||url.split('/').pop()});
  apMode='url';apLoad(apUserUrls.length-1);
}

async function tryRestoreSession(){
  try{
    const raw=localStorage.getItem('dom_session');if(!raw)return false;
    const s=JSON.parse(raw);
    if(!s.roomId||!s.myRole)return false;
    // Check if room still exists
    const snap=await get(ref(db,`rooms/${s.roomId}`));
    if(!snap.exists())return false;
    const r=snap.val();if(r.status!=='playing')return false;
    // Restore
    myId=s.myId;myName=s.myName;myRole=s.myRole;roomId=s.roomId;isHost=s.isHost;vsAI=s.vsAI;
    if(s.lang)setLang(s.lang);

    showScreen('game');listenGame(roomId);listenChat(roomId);loadLocationData();autoStartAudio();startInGamePoetry();

}

async function loadLocationData(){
  if(locLoaded)return;locLoaded=true;
  if(!features.prayer&&!features.weather)return;
  try{
    let lat,lon,city='';
    try{const p=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:7000,maximumAge:3600000}));lat=p.coords.latitude;lon=p.coords.longitude;try{const cr=await(await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)).json();city=cr.address?.city||cr.address?.town||cr.address?.state||'';}catch(e){}}
    catch(e){const ip=await(await fetch('https://ipapi.co/json/')).json();lat=ip.latitude;lon=ip.longitude;city=ip.city||'';}
    const today=new Date(),ps=[];
    if(features.prayer)ps.push(fetch(`https://api.aladhan.com/v1/timings/${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}?latitude=${lat}&longitude=${lon}&method=4`).then(r=>r.json()).then(d=>{renderPrayer(d.data.timings,city);startPrayerCheck(d.data.timings)}));
    if(features.weather)ps.push(loadWeather(lat,lon,city));
    if(features.weather)setInterval(()=>loadWeather(lat,lon,city),600000);
    await Promise.allSettled(ps);
  }catch(e){}
}
const PNAMES={en:{Fajr:'Fajr',Sunrise:'Sunrise',Dhuhr:'Dhuhr',Asr:'Asr',Maghrib:'Maghrib',Isha:'Isha'},ar:{Fajr:'الفجر',Sunrise:'الشروق',Dhuhr:'الظهر',Asr:'العصر',Maghrib:'المغرب',Isha:'العشاء'},fr:{Fajr:'Fajr',Sunrise:'Lever',Dhuhr:'Dhohr',Asr:'Asr',Maghrib:'Maghrib',Isha:'Icha'}};
const PKEYS=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
function renderPrayer(t,city){
  const row=document.getElementById('prayer-mini');row.innerHTML='';
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  let nk=null,md=Infinity;
  PKEYS.forEach(k=>{const v=t[k];if(!v)return;const[h,m]=v.split(':').map(Number);const d=(h*60+m)-nm;if(d>0&&d<md){md=d;nk=k}});
  if(city){const c=document.createElement('span');c.style.cssText='font-size:.42rem;color:var(--text3);flex-shrink:0';c.textContent='📍'+city;row.appendChild(c)}
  PKEYS.forEach(k=>{const v=t[k];if(!v)return;const el=document.createElement('div');el.className='pm-item'+(k===nk?' next':'');el.innerHTML=`<span class="pm-name">${PNAMES[lang]?.[k]||k}</span><span class="pm-time">${v}</span>`;row.appendChild(el)});
}
function startPrayerCheck(t){setInterval(()=>{const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();if(s)return;const ns=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;PKEYS.forEach(k=>{if(t[k]===ns&&!notifiedPrayers.has(ns+'_'+k)){notifiedPrayers.add(ns+'_'+k);document.getElementById('prayer-notify-name').textContent=PNAMES[lang]?.[k]||k;document.getElementById('prayer-notify-time').textContent=ns;document.getElementById('prayer-notify').classList.add('show');}});},1000);}
async function loadWeather(lat,lon,city){try{const d=await(await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`)).json();const c=d.current,code=c.weather_code,temp=Math.round(c.temperature_2m),icon=wIcon(code),desc=wDesc(code,lang);document.getElementById('wm-icon').textContent=icon;document.getElementById('wm-temp').textContent=temp+'°C';document.getElementById('wm-desc').textContent=desc;document.getElementById('city-mini').textContent=city?'📍'+city:'';if(lastWCode!==null&&lastWCode!==code)showWToast(icon,desc,temp);lastWCode=code;}catch(e){}}

const PM={0:[],1:[5],2:[1,9],3:[1,5,9],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};
function mkPips(n){const g=document.createElement('div');g.className='pip-grid';g.dataset.n=n;for(let i=1;i<=9;i++){const c=document.createElement('div');if(PM[n].includes(i)){const p=document.createElement('div');p.className='pip';c.appendChild(p)}g.appendChild(c)}return g}
function mkTile(a,b,cls,chain=false){const t=document.createElement('div');t.className=(chain?'tile chain-t ':'tile ')+cls;const h1=document.createElement('div');h1.className='half';const h2=document.createElement('div');h2.className='half';h1.appendChild(mkPips(a));h2.appendChild(mkPips(b));t.appendChild(h1);t.appendChild(h2);return t}

// ── GAME LOGIC ────────────────────────────────────────────
function allTiles(){const t=[];for(let a=0;a<=6;a++)for(let b=a;b<=6;b++)t.push([a,b]);return t}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function canFit(a,b,e){if(e===-1)return true;return a===e||b===e}
function handCanPlay(h,lE,rE){if(lE===-1)return true;return(h||[]).some(([a,b])=>canFit(a,b,lE)||canFit(a,b,rE))}
function sumHand(h){return(h||[]).reduce((s,[a,b])=>s+a+b,0)}
function placeTile(chain,lE,rE,a,b,side){
  const nc=[...chain],dbl=a===b;
  if(lE===-1){nc.push({a,b,dbl});return{chain:nc,leftEnd:a,rightEnd:b}}
  if(side==='left'){let na,nb;if(b===lE){na=a;nb=b}else{na=b;nb=a}nc.unshift({a:na,b:nb,dbl});return{chain:nc,leftEnd:dbl?nb:na,rightEnd:rE}}
  else{let na,nb;if(a===rE){na=a;nb=b}else{na=b;nb=a}nc.push({a:na,b:nb,dbl});return{chain:nc,leftEnd:lE,rightEnd:dbl?na:nb}}
}

// ── DRAG ─────────────────────────────────────────────────
function showGhost(t,x,y){clearGhost();ghostEl=t.cloneNode(true);ghostEl.style.cssText=`position:fixed;left:${x}px;top:${y}px;transform:translate(-50%,-50%) scale(1.15);pointer-events:none;z-index:999;opacity:.85;transition:none`;document.body.appendChild(ghostEl)}
function moveGhost(x,y){if(ghostEl){ghostEl.style.left=x+'px';ghostEl.style.top=y+'px'}}
function clearGhost(){if(ghostEl){ghostEl.remove();ghostEl=null}}
function highlightDZ(on){document.querySelectorAll('.drop-zone').forEach(dz=>{dz.classList.toggle('drag-over',on)})}

// ── SNAKE CHAIN RENDER ───────────────────────────────────
function renderChain(gs){
  const chain=gs.chain||[];
  const chainWrap=document.getElementById('chain-wrap');
  const chainEl=document.getElementById('chain');
  chainEl.innerHTML='';
  const amActive=(gs.activePlayers||[]).includes(myRole);
  const isMyT=gs.turn===myRole&&!gs.winner&&amActive&&!pendingMove;

  // Empty board
  if(!chain.length){
    const hint=document.createElement('div');
    hint.className='drop-zone';
    hint.style.cssText='width:180px;height:70px;font-size:.82rem;padding:0 20px;margin:auto;border-radius:14px';
    hint.textContent=amActive&&isMyT?(lang==='ar'?'اسحب قطعة هنا':'Drag a tile here'):'Waiting…';
    if(isMyT){
      hint.addEventListener('dragover',e=>{e.preventDefault();hint.classList.add('drag-over')});
      hint.addEventListener('dragleave',()=>hint.classList.remove('drag-over'));
      hint.addEventListener('drop',e=>{e.preventDefault();hint.classList.remove('drag-over');if(dragIdx!==null)doPlay(dragIdx,'right')});
      hint.addEventListener('touchend',e=>{e.preventDefault();if(dragIdx!==null){doPlay(dragIdx,'right');dragIdx=null;clearGhost()}});
    }
    chainEl.appendChild(hint);
    // Center vertically
    chainWrap.style.justifyContent='center';
    return;
  }

  // Calculate tiles per row — match CSS tile widths exactly
  const scrollEl=document.getElementById('table-scroll');
  const W=(scrollEl.clientWidth||window.innerWidth)-18;
  const vw=window.innerWidth;
  // H tile widths from CSS (chain-t.H widths + gap)
  const TILE=vw<=380?47:vw<=599?65:vw<=899?80:vw<=899?80:98;
  const tpr=Math.max(2,Math.floor(W/TILE));

  // Split into rows
  const rows=[];
  for(let i=0;i<chain.length;i+=tpr)rows.push(chain.slice(i,i+tpr));

  // chain-wrap: when chain fits table height, it stays centered (align-self:center)
  // when chain overflows, scroll to bottom to show latest
  chainWrap.style.width='100%';

  rows.forEach((row,ri)=>{
    const isRTL=ri%2===1;
    const startIdx=ri*tpr;

    const rowEl=document.createElement('div');
    rowEl.style.cssText='display:flex;align-items:center;gap:3px;width:100%;';

    // Drop zone LEFT — only on row 0, LTR side
    if(ri===0&&isMyT){
      const dz=makeDZ('left');
      rowEl.appendChild(dz);
    }

    // RTL rows: right-aligned with spacer
    if(isRTL){
      const sp=document.createElement('div');sp.style.flex='1';
      rowEl.appendChild(sp);
    }

    // Tiles (reversed display for RTL rows)
    const displayed=isRTL?[...row].reverse():row;
    displayed.forEach(({a,b,dbl},di)=>{
      const ci=isRTL?(startIdx+row.length-1-di):(startIdx+di);
      const t=mkTile(a,b,dbl?'DBL':'H',true);
      if(gs.pendingIdx!=null&&ci===gs.pendingIdx&&gs.pendingRole===myRole)t.classList.add('pending');
      rowEl.appendChild(t);
    });

    // Drop zone RIGHT — last row, after tiles
    if(ri===rows.length-1&&isMyT){
      const dz=makeDZ('right');
      if(isRTL)rowEl.insertBefore(dz,rowEl.firstChild);
      else rowEl.appendChild(dz);
    }

    // LTR rows: spacer pushes drop zone right
    if(!isRTL&&ri!==rows.length-1){
      const sp=document.createElement('div');sp.style.flex='1';
      rowEl.appendChild(sp);
    }

    chainEl.appendChild(rowEl);

    // Snake connector between rows
    if(ri<rows.length-1){
      const conn=document.createElement('div');
      conn.style.cssText='font-size:.7rem;color:rgba(255,255,255,.15);padding:0 4px;line-height:1;text-align:'+(isRTL?'left':'right');
      conn.textContent=isRTL?'↙':'↘';
      chainEl.appendChild(conn);
    }
  });

  // Scroll to bottom when chain overflows the table height
  requestAnimationFrame(()=>{
    if(scrollEl.scrollHeight>scrollEl.clientHeight+20){
      scrollEl.scrollTop=scrollEl.scrollHeight;
    }
  });
}

function makeDZ(side){
  const dz=document.createElement('div');
  dz.className='drop-zone';
  dz.dataset.side=side;
  dz.textContent=side==='left'?'←':'→';
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(dragIdx!==null)doPlay(dragIdx,side)});
  dz.addEventListener('touchend',e=>{e.preventDefault();if(dragIdx!==null){doPlay(dragIdx,side);dragIdx=null;clearGhost()}});
  dz.addEventListener('click',()=>{if(dragIdx!==null)doPlay(dragIdx,side)});
  return dz;
}

function renderOpps(gs){
  const row=document.getElementById('opps-row');row.innerHTML='';const scRow=document.getElementById('scores-row');scRow.innerHTML='';
  const roles=gs.activePlayers||[],waiting=gs.waitingPlayers||[];

    if(role===myRole)return;
    const name=gs.names?.[role]||role,hand=gs[role+'Hand']||[],sc=localScores[role]||0,isT=gs.turn===role;
    const info=document.createElement('div');info.className='opp-info';
    const nm=document.createElement('div');nm.className='opp-name';nm.textContent=`${name}(${hand.length})${isT?' ●':''}`;
    const tr=document.createElement('div');tr.className='opp-tiles-row';hand.slice(0,12).forEach(()=>{const bt=document.createElement('div');bt.className='back-tile';tr.appendChild(bt)});
    info.appendChild(nm);info.appendChild(tr);row.appendChild(info);
    const sb=document.createElement('div');sb.className='sbox'+(isT?' myturn':'');sb.innerHTML=`<div class="sl">${name}</div><div class="sv">${sc}</div>`;scRow.appendChild(sb);
  });
  if(waiting.length){const wb=document.createElement('div');wb.className='wait-badge';wb.textContent=`⏳ ${waiting.map(r=>gs.names?.[r]||r).join(', ')}`;row.appendChild(wb)}
  const mn=gs.names?.[myRole]||'Me',msc=localScores[myRole]||0,isMyT=gs.turn===myRole;

}

function renderHand(gs){
  const myHand=gs[myRole+'Hand']||[],lE=gs.leftEnd,rE=gs.rightEnd;
  const active=(gs.activePlayers||[]).includes(myRole);
  const isMyT=gs.turn===myRole&&!gs.winner&&active;const inUndo=!!pendingMove;
  const el=document.getElementById('my-hand');el.innerHTML='';
  if(!active){el.innerHTML=`<div style="color:var(--text3);font-size:.71rem;padding:12px;text-align:center">${T[lang].waitNext}</div>`;document.getElementById('btn-draw').disabled=true;return}
  myHand.forEach(([a,b],i)=>{
    const cL=canFit(a,b,lE),cR=canFit(a,b,rE);
    const playable=!gs.chain?.length||(cL||cR);
    const t=mkTile(a,b,'V');
    if(inUndo||!isMyT||!playable){t.classList.add('dim');}
    else{
      t.draggable=true;t.style.cursor='grab';

      // ── DOUBLE CLICK/TAP → auto play ──
      let tapTimer=null,tapCount=0;
      const autoPlay=()=>{
        const gs2=lastGS;if(!gs2)return;
        const[ta,tb]=myHand[i];
        const tcL=canFit(ta,tb,gs2.leftEnd),tcR=canFit(ta,tb,gs2.rightEnd);
        if(!gs2.chain?.length){doPlay(i,'right');}
        else if(tcL&&!tcR){doPlay(i,'left');}
        else if(!tcL&&tcR){doPlay(i,'right');}
        // if both sides → don't auto, wait for drag to choose side
      };
      t.addEventListener('dblclick',e=>{e.preventDefault();autoPlay()});
      // Touch double-tap
      t.addEventListener('touchend',e=>{
        // Only handle as tap (not drag)
        if(dragIdx!==null)return;
        tapCount++;
        if(tapCount===1){tapTimer=setTimeout(()=>{tapCount=0},400);}
        else if(tapCount>=2){clearTimeout(tapTimer);tapCount=0;e.preventDefault();autoPlay();}
      });

      t.addEventListener('dragstart',e=>{dragIdx=i;t.style.opacity='.4';e.dataTransfer.effectAllowed='move';highlightDZ(true)});
      t.addEventListener('dragend',e=>{
        t.style.opacity='';highlightDZ(false);
        if(dragIdx===null)return;
        const mid=window.innerWidth/2;
        const[ta,tb]=myHand[dragIdx];
        const tcL=canFit(ta,tb,lE),tcR=canFit(ta,tb,rE);
        if(!gs.chain?.length)doPlay(dragIdx,'right');
        else if(tcL&&tcR)doPlay(dragIdx,e.clientX<mid?'left':'right');
        else if(tcL)doPlay(dragIdx,'left');
        else if(tcR)doPlay(dragIdx,'right');
        dragIdx=null;
      });
      t.addEventListener('touchstart',e=>{dragIdx=i;const tc=e.touches[0];showGhost(t,tc.clientX,tc.clientY);t.style.opacity='.4';highlightDZ(true)},{passive:true});
      t.addEventListener('touchmove',e=>{e.preventDefault();const tc=e.touches[0];moveGhost(tc.clientX,tc.clientY);const mid=window.innerWidth/2;document.querySelectorAll('.drop-zone').forEach(dz=>{dz.classList.toggle('drag-over',dz.dataset.side===(tc.clientX<mid?'left':'right'))})},{passive:false});
      t.addEventListener('touchend',e=>{
        e.preventDefault();clearGhost();t.style.opacity='';highlightDZ(false);
        document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('drag-over'));
        if(dragIdx===null)return;
        const tc=e.changedTouches[0],mid=window.innerWidth/2;
        const[ta,tb]=myHand[dragIdx];
        const tcL=canFit(ta,tb,lE),tcR=canFit(ta,tb,rE);
        if(!gs.chain?.length)doPlay(dragIdx,'right');
        else if(tcL&&tcR)doPlay(dragIdx,tc.clientX<mid?'left':'right');
        else if(tcL)doPlay(dragIdx,'left');
        else if(tcR)doPlay(dragIdx,'right');
        dragIdx=null;
      });
    }
    el.appendChild(t);
  });
  document.getElementById('btn-draw').disabled=!isMyT||inUndo;
}

async function doPlay(idx,sideIn){
  const gs=lastGS;if(!gs||gs.turn!==myRole||gs.winner)return;
  if(!(gs.activePlayers||[]).includes(myRole))return;
  const myHand=[...(gs[myRole+'Hand']||[])];if(idx>=myHand.length)return;
  const[a,b]=myHand[idx],lE=gs.leftEnd,rE=gs.rightEnd;
  let side=sideIn;
  if(gs.chain?.length){const cL=canFit(a,b,lE),cR=canFit(a,b,rE);if(!cL&&!cR)return;if(side==='left'&&!cL)side='right';else if(side==='right'&&!cR)side='left';}
  myHand.splice(idx,1);const res=placeTile(gs.chain||[],lE,rE,a,b,side);
  const roles=gs.activePlayers||[],mi=roles.indexOf(myRole),nr=roles[(mi+1)%roles.length];
  let winner=null;
  if(!myHand.length)winner=myRole;
  else{const ab=roles.every(r=>{const h=r===myRole?myHand:(gs[r+'Hand']||[]);return !handCanPlay(h,res.leftEnd,res.rightEnd)});if(ab&&!gs.boneyard?.length){let ms=Infinity;roles.forEach(r=>{const h=r===myRole?myHand:(gs[r+'Hand']||[]);const s=sumHand(h);if(s<ms){ms=s;winner=r}})}}
  const pi=side==='left'?0:res.chain.length-1;
  pendingMove={prevHand:[...(gs[myRole+'Hand']||[])],prevChain:[...(gs.chain||[])],prevLeft:gs.leftEnd,prevRight:gs.rightEnd,prevTurn:gs.turn,winner};
  const upd={[`rooms/${roomId}/game/${myRole}Hand`]:myHand,[`rooms/${roomId}/game/chain`]:res.chain,[`rooms/${roomId}/game/leftEnd`]:res.leftEnd,[`rooms/${roomId}/game/rightEnd`]:res.rightEnd,[`rooms/${roomId}/game/pendingRole`]:myRole,[`rooms/${roomId}/game/pendingIdx`]:pi,[`rooms/${roomId}/game/turn`]:myRole};
  if(winner)upd[`rooms/${roomId}/game/winner`]=winner;
  playTileSound();await update(ref(db),upd);startUndo(nr,5);
}

function startUndo(nr,secs){
  const bar=document.getElementById('undo-bar'),fill=document.getElementById('undo-fill'),txt=document.getElementById('undo-text');
  bar.classList.add('show');fill.style.transition='none';fill.style.width='100%';
  setTimeout(()=>{fill.style.transition=`width ${secs}s linear`;fill.style.width='0%'},30);
  let rem=secs;txt.textContent=(T[lang].undo||'Undo?')+` (${rem}s)`;
  undoInterval=setInterval(()=>{rem--;txt.textContent=(T[lang].undo||'Undo?')+` (${rem}s)`;if(!rem){clearInterval(undoInterval);undoInterval=null}},1000);
  undoTimer=setTimeout(async()=>{
    bar.classList.remove('show');const pm=pendingMove;pendingMove=null;
    await update(ref(db),{[`rooms/${roomId}/game/turn`]:nr,[`rooms/${roomId}/game/pendingRole`]:null,[`rooms/${roomId}/game/pendingIdx`]:null});
    if(pm?.winner){endGame(pm.winner,lastGS?.names);return}
    if(vsAI&&nr!==myRole)setTimeout(()=>runAI(nr),600);
  },secs*1000);
}

function doUndo(){
  if(!pendingMove)return;
  clearTimeout(undoTimer);clearInterval(undoInterval);undoTimer=null;undoInterval=null;
  document.getElementById('undo-bar').classList.remove('show');
  const pm=pendingMove;pendingMove=null;
  update(ref(db),{[`rooms/${roomId}/game/${myRole}Hand`]:pm.prevHand,[`rooms/${roomId}/game/chain`]:pm.prevChain,[`rooms/${roomId}/game/leftEnd`]:pm.prevLeft,[`rooms/${roomId}/game/rightEnd`]:pm.prevRight,[`rooms/${roomId}/game/turn`]:pm.prevTurn,[`rooms/${roomId}/game/pendingRole`]:null,[`rooms/${roomId}/game/pendingIdx`]:null,[`rooms/${roomId}/game/winner`]:null});
}

async function runAI(role){
  const gs=lastGS;if(!gs||gs.winner||gs.turn!==role)return;
  let hand=[...(gs[role+'Hand']||[])],boneyard=[...(gs.boneyard||[])],chain=[...(gs.chain||[])],lE=gs.leftEnd,rE=gs.rightEnd;
  const roles=gs.activePlayers||[];
  while(!handCanPlay(hand,lE,rE)&&boneyard.length>2)hand.push(boneyard.pop());
  let played=false;
  if(handCanPlay(hand,lE,rE)){
    let bi=-1,bs='right',bsc=-1;
    hand.forEach(([a,b],i)=>{const cL=canFit(a,b,lE),cR=canFit(a,b,rE);if(!cL&&!cR&&chain.length)return;const sc=(a===b?100:0)+a+b;if(sc>bsc){bsc=sc;bi=i;bs=cR?'right':'left'}});
    if(bi!==-1){
      const[a,b]=hand[bi];hand.splice(bi,1);const res=placeTile(chain,lE,rE,a,b,bs);chain=res.chain;lE=res.leftEnd;rE=res.rightEnd;
      const mi=roles.indexOf(role),nr=roles[(mi+1)%roles.length];let w=null;if(!hand.length)w=role;
      const upd={[`rooms/${roomId}/game/${role}Hand`]:hand,[`rooms/${roomId}/game/boneyard`]:boneyard,[`rooms/${roomId}/game/chain`]:chain,[`rooms/${roomId}/game/leftEnd`]:lE,[`rooms/${roomId}/game/rightEnd`]:rE,[`rooms/${roomId}/game/turn`]:w?role:nr,[`rooms/${roomId}/game/pendingRole`]:null,[`rooms/${roomId}/game/pendingIdx`]:null};
      if(w)upd[`rooms/${roomId}/game/winner`]=w;await update(ref(db),upd);played=true;
      if(!w&&nr!==myRole)setTimeout(()=>runAI(nr),800);
    }
  }
  if(!played){const mi=roles.indexOf(role),nr=roles[(mi+1)%roles.length];await update(ref(db),{[`rooms/${roomId}/game/${role}Hand`]:hand,[`rooms/${roomId}/game/boneyard`]:boneyard,[`rooms/${roomId}/game/turn`]:nr});if(nr!==myRole)setTimeout(()=>runAI(nr),600);}
}

function onDraw(){
  const gs=lastGS;if(!gs||gs.turn!==myRole||gs.winner||pendingMove)return;
  const by=[...(gs.boneyard||[])];if(by.length<=2){setMsg(T[lang].boneyardEmpty);return}
  const h=[...(gs[myRole+'Hand']||[])];h.push(by.pop());
  update(ref(db),{[`rooms/${roomId}/game/${myRole}Hand`]:h,[`rooms/${roomId}/game/boneyard`]:by});
}

function applyGS(gs){
  lastGS=gs;if(!gs)return;
  const active=(gs.activePlayers||[]).includes(myRole);
  const isMyT=gs.turn===myRole&&!gs.winner&&active;
  renderChain(gs);renderOpps(gs);renderHand(gs);
  if(gs.winner&&!pendingMove){endGame(gs.winner,gs.names);return}
  if(pendingMove)setMsg('⏳ '+T[lang].undo+'…');
  else if(isMyT){
    const h=gs[myRole+'Hand']||[];
    if(!handCanPlay(h,gs.leftEnd,gs.rightEnd)&&(gs.boneyard||[]).length<=2){
      setMsg(T[lang].cantPlay);
      setTimeout(async()=>{const r=gs.activePlayers||[],mi=r.indexOf(myRole),nr=r[(mi+1)%r.length];await update(ref(db),{[`rooms/${roomId}/game/turn`]:nr})},1200);
    }else setMsg(T[lang].yourTurn);
  }else if(!active)setMsg(T[lang].waitNext);
  else setMsg(`<span class="spin"></span> ${gs.names?.[gs.turn]||gs.turn} ${T[lang].oppTurn}`);
}
function setMsg(t){document.getElementById('msg-bar').innerHTML=t}

function endGame(winner,names){
  if(pendingMove)return;
  const iWon=winner===myRole;
  if(!localScores[winner])localScores[winner]=0;localScores[winner]++;
  if(iWon)playWinSound();
  document.getElementById('win-emoji').textContent=iWon?'🏆':'😔';
  document.getElementById('win-title').textContent=iWon?(lang==='ar'?'مبروك كسبت!':lang==='fr'?'Félicitations!':'You Won!'):`${names?.[winner]||winner} ${lang==='ar'?'كسب':'Wins!'}`;
  document.getElementById('win-sub').textContent=iWon?(lang==='ar'?'أحسنت!':'Excellent play!'):(lang==='ar'?'حاول مرة تانية':'Try again!');
  document.getElementById('win-bg').classList.add('show');
}

async function sendChatFile(input){const file=input.files?.[0];if(!file||!roomId)return;input.value='';if(file.size>2*1024*1024){alert('Max 2MB');return}const reader=new FileReader();reader.onload=async e=>{const isVid=file.type.startsWith('video/');const msg={role:myRole,name:myName,mediaUrl:e.target.result,mediaType:isVid?'video':'image',ts:Date.now(),time:fmtTime(Date.now())};if(chatTab==='game')await push(ref(db,`rooms/${roomId}/chat`),msg);else await push(ref(db,'globalChat'),msg)};reader.readAsDataURL(file)}

// ── ROOM ─────────────────────────────────────────────────
function createGS(players,bots=[]){
  const tiles=shuffle(allTiles()),roles=Object.keys(players),n=roles.length,tpp=n<=3?7:5;
  const hands={};roles.forEach(r=>{hands[r+'Hand']=tiles.splice(0,tpp)});
  let fr=roles[0],mv=-1;roles.forEach(r=>{hands[r+'Hand'].forEach(([a,b])=>{if(a===b&&a>mv){mv=a;fr=r}})});
  return{roles,activePlayers:roles,waitingPlayers:[],names:players,...Object.fromEntries(roles.map(r=>[r+'Hand',hands[r+'Hand']])),boneyard:tiles,chain:[],leftEnd:-1,rightEnd:-1,turn:fr,winner:null,pendingRole:null,pendingIdx:null,botRoles:bots};
}
function listenGame(rid){if(unsubGame)unsubGame();unsubGame=onValue(ref(db,`rooms/${rid}/game`),s=>applyGS(s.val()))}
function listenRoom(rid){
  if(unsubRoom)unsubRoom();
  unsubRoom=onValue(ref(db,`rooms/${rid}`),s=>{
    const r=s.val();if(!r)return;
    const pl=document.getElementById('players-list');
    if(pl){pl.innerHTML='';Object.entries(r.players||{}).forEach(([role,name])=>{const c=document.createElement('div');c.className='player-pill'+(role===myRole?' me':'');c.innerHTML=`<div class="player-dot"></div>${name}${role===myRole?' (you)':''}`;pl.appendChild(c)})}
    const cnt=Object.keys(r.players||{}).length;
    const sb=document.getElementById('btn-start-game');if(sb)sb.style.display=(isHost&&cnt>=2)?'block':'none';
    if(r.status==='playing'){showScreen('game');listenGame(rid);listenChat(rid);loadLocationData();saveSession();autoStartAudio();}
  });
}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:5},()=>c[~~(Math.random()*c.length)]).join('')}
function genId(){return Math.random().toString(36).slice(2,10)}
function showScreen(id){document.querySelectorAll('.screen,#game').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function lobbyErr(t){document.getElementById('lobby-err').textContent=t}
async function logPlayer(name,role){try{let country='Unknown',city='Unknown';try{const ip=await(await fetch('https://ipapi.co/json/')).json();country=ip.country_name||'?';city=ip.city||'?';}catch(e){}const ua=navigator.userAgent,device=/Mobi|Android|iPhone|iPad/i.test(ua)?'Mobile':'Desktop';await set(ref(db,`playerLogs/${roomId}_${role}`),{name,country,city,device,lang,joinedAt:Date.now(),roomId});}catch(e){}}

async function createRoom(){
  const name=document.getElementById('inp-name').value.trim();if(!name){lobbyErr(lang==='ar'?'اكتب اسمك':'Enter your name');return}
  myName=name;myId=genId();myRole='p1';isHost=true;vsAI=false;roomId=genCode();lobbyErr('');
  await set(ref(db,`rooms/${roomId}`),{hostId:myId,status:'waiting',players:{p1:name},created:Date.now()});
  logPlayer(name,'p1');
  document.getElementById('room-code-display').textContent=roomId;
  document.getElementById('btn-start-game').style.display='none';
  showScreen('waiting');listenRoom(roomId);
}
async function startVsAI(){
  const name=document.getElementById('inp-name').value.trim()||(lang==='ar'?'لاعب':'Player');
  myName=name;myId=genId();myRole='p1';isHost=true;vsAI=true;roomId=genCode();
  const pm={p1:name,p2:'🤖 AI'};const gs=createGS(pm,['p2']);
  await set(ref(db,`rooms/${roomId}`),{hostId:myId,status:'playing',players:pm,created:Date.now()});
  await set(ref(db,`rooms/${roomId}/game`),gs);
  logPlayer(name,'p1');saveSession();
  showScreen('game');listenGame(roomId);listenChat(roomId);loadLocationData();autoStartAudio();startInGamePoetry();
  setTimeout(()=>{if(lastGS?.turn!==myRole)runAI(lastGS?.turn)},1000);
}
async function joinRoom(){
  const name=document.getElementById('inp-name').value.trim();const code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(!name){lobbyErr(lang==='ar'?'اكتب اسمك':'Enter your name');return}
  if(!code||code.length<4){lobbyErr(lang==='ar'?'اكتب كود الغرفة':'Enter room code');return}
  myName=name;myId=genId();isHost=false;vsAI=false;roomId=code;lobbyErr('');
  const sn=await get(ref(db,`rooms/${code}`));if(!sn.exists()){lobbyErr(lang==='ar'?'الغرفة مش موجودة':'Room not found');return}
  const r=sn.val();const players=r.players||{};const cnt=Object.keys(players).length;
  if(cnt>=6){lobbyErr(lang==='ar'?'الغرفة ممتلئة':'Room is full');return}
  myRole='p'+(cnt+1);players[myRole]=name;await update(ref(db,`rooms/${code}`),{players});
  logPlayer(name,myRole);
  if(r.status==='playing'){
    const gs=(await get(ref(db,`rooms/${code}/game`))).val();
    if(gs){const by=[...(gs.boneyard||[])];const mt=by.splice(0,Math.min(5,by.length));const wt=[...(gs.waitingPlayers||[]),myRole];const nm={...(gs.names||{}),[myRole]:name};await update(ref(db),{[`rooms/${code}/game/${myRole}Hand`]:mt,[`rooms/${code}/game/boneyard`]:by,[`rooms/${code}/game/waitingPlayers`]:wt,[`rooms/${code}/game/names`]:nm});}
    saveSession();showScreen('game');listenGame(code);listenChat(code);loadLocationData();autoStartAudio();startInGamePoetry();
  }else{document.getElementById('room-code-display').textContent=code;showScreen('waiting');listenRoom(code);}
}
async function startGame(){
  const sn=await get(ref(db,`rooms/${roomId}`));const r=sn.val();if(!r)return;
  const p=r.players||{};if(Object.keys(p).length<2)return;
  const gs=createGS(p,[]);
  await update(ref(db,`rooms/${roomId}`),{status:'playing'});await set(ref(db,`rooms/${roomId}/game`),gs);
  await push(ref(db,`rooms/${roomId}/chat`),{system:true,text:'🎮 Game started!',ts:Date.now()});
}
function cancelWait(){if(unsubRoom){unsubRoom();unsubRoom=null}if(roomId&&isHost)remove(ref(db,`rooms/${roomId}`));clearSession();roomId=null;showScreen('landing')}
function copyCode(){const code=document.getElementById('room-code-display').textContent;navigator.clipboard?.writeText(code).then(()=>{const btn=document.getElementById('btn-copy-code');btn.textContent='✓';setTimeout(()=>btn.textContent='📋 نسخ',2000)})}
async function newGame(){
  document.getElementById('win-bg').classList.remove('show');if(!isHost)return;
  const sn=await get(ref(db,`rooms/${roomId}`));const r=sn.val();if(!r)return;
  const gs=createGS(r.players||{},lastGS?.botRoles||[]);
  await set(ref(db,`rooms/${roomId}/game`),gs);
  await push(ref(db,`rooms/${roomId}/chat`),{system:true,text:'🔄 New game!',ts:Date.now()});
  if(vsAI)setTimeout(()=>{if(lastGS?.turn!==myRole)runAI(lastGS?.turn)},1000);
}
function confirmHome(){
  // Show confirm dialog
  const msg=lang==='ar'?'هتخرج من اللعبة وترجع للرئيسية؟':'Leave the game and go to main menu?';
  if(confirm(msg))leaveGame();
}

// Auto-start audio when game begins (if audio feature is on)
function autoStartAudio(){
  if(features.audio&&!apPlaying){
    apShow();
    setTimeout(()=>{apLoad(apIdx)},500);
  }
}

function leaveGame(){
  [unsubGame,unsubRoom,unsubChat,unsubGlobal].forEach(u=>{if(u)u()});unsubGame=unsubRoom=unsubChat=unsubGlobal=null;
  if(undoTimer)clearTimeout(undoTimer);if(undoInterval)clearInterval(undoInterval);
  if(roomId&&isHost)remove(ref(db,`rooms/${roomId}`));
  clearSession();roomId=null;myRole=null;lastGS=null;pendingMove=null;dragIdx=null;localScores={};vsAI=false;isHost=false;locLoaded=false;chatOpen=false;gameMessages=[];globalMessages=[];unreadGame=0;unreadGlobal=0;
  document.getElementById('win-bg').classList.remove('show');document.getElementById('undo-bar').classList.remove('show');document.getElementById('chat-panel').classList.remove('show');apClose();
  showScreen('landing');
}
