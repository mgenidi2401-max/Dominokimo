<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsLine - الدردشة</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Tahoma,sans-serif;
  background:#0d1117;
  color:#fff;
  height:100vh;
  overflow:hidden;
}
.app{
  display:flex;
  height:100vh;
}
.sidebar{
  width:270px;
  background:#161b22;
  border-left:1px solid #30363d;
  padding:15px;
  display:flex;
  flex-direction:column;
}
.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}
.logo span{color:#39d353}
.search{
  width:100%;
  padding:12px;
  background:#21262d;
  border:1px solid #30363d;
  border-radius:8px;
  color:#fff;
  margin-bottom:15px;
}
.contacts{
  flex:1;
  overflow:auto;
}
.contact{
  padding:12px;
  background:#21262d;
  border-radius:8px;
  margin-bottom:8px;
  cursor:pointer;
}
.contact:hover{background:#30363d}
.add-btn{
  padding:12px;
  background:#238636;
  color:white;
  border:0;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}
.topbar{
  height:60px;
  background:#161b22;
  border-bottom:1px solid #30363d;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}
.logout{
  background:#da3633;
  color:white;
  border:0;
  padding:8px 18px;
  border-radius:8px;
  cursor:pointer;
}
.chat{
  flex:1;
  padding:20px;
  overflow:auto;
}
.empty{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#8b949e;
}
.message{
  max-width:60%;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}
.sent{
  background:#238636;
  margin-right:auto;
}
.received{
  background:#21262d;
  margin-left:auto;
}
.input-area{
  display:flex;
  gap:10px;
  padding:15px;
  background:#161b22;
  border-top:1px solid #30363d;
}
.input-area input{
  flex:1;
  padding:12px;
  background:#21262d;
  border:1px solid #30363d;
  border-radius:8px;
  color:#fff;
}
.input-area button{
  padding:12px 20px;
  background:#1f6feb;
  color:white;
  border:0;
  border-radius:8px;
  cursor:pointer;
}
.hidden{display:none}
</style>
</head>

<body>

<div class="app">

  <div class="main">
    <div class="topbar">
      <button class="logout" onclick="logout()">خروج</button>
      <div id="chatTitle">اختر محادثة</div>
    </div>

    <div class="chat" id="chatBox">
      <div class="empty">اختر محادثة من القائمة</div>
    </div>

    <div class="input-area hidden" id="messageArea">
      <input type="text" id="messageInput" placeholder="اكتب رسالة...">
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="logo">News<span>Line</span></div>

    <input class="search" id="searchInput" placeholder="بحث..." oninput="renderContacts()">

    <div class="contacts" id="contactsList"></div>

    <button class="add-btn" onclick="addContact()">+ إضافة شخص جديد</button>
  </div>

</div>

<script>
let contacts = JSON.parse(localStorage.getItem("newsline_contacts")) || [];
let chats = JSON.parse(localStorage.getItem("newsline_chats")) || {};
let currentContact = null;

function saveData(){
  localStorage.setItem("newsline_contacts", JSON.stringify(contacts));
  localStorage.setItem("newsline_chats", JSON.stringify(chats));
}

function renderContacts(){
  const list = document.getElementById("contactsList");
  const search = document.getElementById("searchInput").value.trim().toLowerCase();

  list.innerHTML = "";

  const filtered = contacts.filter(c => c.name.toLowerCase().includes(search));

  if(filtered.length === 0){
    list.innerHTML = `
      <div style="color:#8b949e;text-align:center;margin-top:30px">
        لا توجد جهات اتصال<br>
        اضغط إضافة شخص جديد أدناه
      </div>
    `;
    return;
  }

  filtered.forEach(contact => {
    const div = document.createElement("div");
    div.className = "contact";
    div.innerHTML = "👤 " + contact.name;
    div.onclick = () => openChat(contact.id);
    list.appendChild(div);
  });
}

function addContact(){
  const name = prompt("اكتب اسم الشخص:");
  if(!name || name.trim() === "") return;

  const id = Date.now().toString();

  contacts.push({
    id: id,
    name: name.trim()
  });

  chats[id] = [];

  saveData();
  renderContacts();
  openChat(id);
}

function openChat(id){
  currentContact = id;

  const contact = contacts.find(c => c.id === id);
  document.getElementById("chatTitle").innerText = contact.name;
  document.getElementById("messageArea").classList.remove("hidden");

  renderMessages();
}

function renderMessages(){
  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  const messages = chats[currentContact] || [];

  if(messages.length === 0){
    box.innerHTML = `<div class="empty">لا توجد رسائل بعد</div>`;
    return;
  }

  messages.forEach(msg => {
    const div = document.createElement("div");
    div.className = "message sent";
    div.innerText = msg;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

function sendMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!text || !currentContact) return;

  chats[currentContact].push(text);
  input.value = "";

  saveData();
  renderMessages();
}

function logout(){
  alert("تم تسجيل الخروج");
}

document.getElementById("messageInput").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

renderContacts();
</script>

</body>
</html>
