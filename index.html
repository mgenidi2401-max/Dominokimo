<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>دومينو - Dominokimo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap');
:root {
  --bg:#0d1b2a; --surface:#1b2d3e; --card:#243447;
  --gold:#f5c842; --red:#e84040; --green:#1a5c2a;
  --felt:#1a5c2a; --felt2:#0f3d1a;
  --ivory:#f8f4eb; --pip:#1a1a2e;
  --text:#dde8f0; --muted:#6a8a9a;
  --shadow:rgba(0,0,0,0.6);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100dvh;max-width:700px;margin:0 auto}

/* SCREENS */
.screen{display:none;flex-direction:column;height:100%;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}
#game{display:none;flex-direction:column;height:100%}
#game.active{display:flex}

/* LOBBY */
#lobby{background:radial-gradient(ellipse at 50% 20%,#1b2d3e,#0d1b2a)}
#lobby h1{font-family:'Amiri',serif;font-size:2.8rem;color:var(--gold);text-shadow:0 0 30px rgba(245,200,66,.4);margin-bottom:4px;text-align:center}
#lobby .sub{color:var(--muted);font-size:.9rem;margin-bottom:32px;text-align:center}
.card{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;width:100%;max-width:400px;margin-bottom:14px}
.card h3{color:var(--gold);font-size:.95rem;margin-bottom:12px;text-align:center}
.inp{width:100%;font-family:'Cairo',sans-serif;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;color:var(--text);font-size:.9rem;outline:none;margin-bottom:10px;text-align:right}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted)}
.bbtn{width:100%;font-family:'Cairo',sans-serif;border:none;border-radius:11px;padding:13px;font-size:.95rem;font-weight:800;cursor:pointer;touch-action:manipulation;transition:all .15s;margin-bottom:8px}
.bbtn.gold{background:var(--gold);color:#000}
.bbtn.gold:hover{background:#ddb020}
.bbtn.blue{background:#1565c0;color:#fff}
.bbtn.blue:hover{background:#1976d2}
.bbtn.gray{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid rgba(255,255,255,.12)}
.divider{color:var(--muted);text-align:center;font-size:.8rem;margin:6px 0}
#lobby-err{color:var(--red);font-size:.8rem;min-height:18px;text-align:center;margin-top:4px}

/* WAITING */
#waiting{background:var(--bg);text-align:center}
#waiting h2{font-family:'Amiri',serif;font-size:1.8rem;color:var(--gold);margin-bottom:10px}
.room-code{font-size:2.8rem;font-weight:900;color:var(--text);letter-spacing:8px;background:var(--card);padding:14px 30px;border-radius:14px;margin:16px 0;border:2px dashed rgba(255,255,255,.15);font-family:monospace}
.players-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.player-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;font-size:.82rem;color:var(--text)}
.player-chip.me{border-color:var(--gold);color:var(--gold)}
.sbtn{font-family:'Cairo',sans-serif;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:9px 18px;color:var(--muted);font-size:.82rem;cursor:pointer;margin:4px;touch-action:manipulation}
.sbtn.start{background:var(--gold);color:#000;border:none;font-weight:800}
.sbtn.danger{color:var(--red);border-color:rgba(232,64,64,.3)}

/* GAME HEADER */
#hdr{background:linear-gradient(180deg,#0d1b2a,#1b2d3e);border-bottom:2px solid rgba(245,200,66,.2);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#hdr h1{font-family:'Amiri',serif;font-size:1.3rem;color:var(--gold)}
.scores{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.sbox{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:3px 8px;text-align:center;min-width:54px}
.sbox .sl{font-size:.58rem;color:var(--muted);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.sbox .sv{font-size:1rem;font-weight:900;color:var(--gold);line-height:1.3}
.sbox.myturn{border-color:var(--gold);box-shadow:0 0 8px rgba(245,200,66,.3)}

/* OPPONENTS ROW */
#opps-row{background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.05);padding:6px 10px;flex-shrink:0;display:flex;gap:10px;flex-wrap:wrap;min-height:52px;align-items:center}
.opp-info{display:flex;flex-direction:column;align-items:center;gap:2px}
.opp-name{font-size:.6rem;color:var(--muted)}
.opp-tiles-row{display:flex;gap:2px}
.back-tile{width:16px;height:29px;background:linear-gradient(135deg,#1b3a5c,#0f2540);border-radius:3px;border:1px solid rgba(255,255,255,.1);flex-shrink:0}

/* FELT TABLE */
#table-wrap{flex:1;overflow:hidden;position:relative;background:radial-gradient(ellipse at 50% 40%,#256b30,var(--felt) 50%,var(--felt2))}
#table-wrap::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.012) 0,rgba(255,255,255,.012) 1px,transparent 1px,transparent 7px),repeating-linear-gradient(-45deg,rgba(255,255,255,.012) 0,rgba(255,255,255,.012) 1px,transparent 1px,transparent 7px);pointer-events:none;z-index:0}
#table-scroll{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch}
#chain-container{position:relative;min-width:100%;min-height:100%;display:flex;align-items:center;justify-content:flex-start;padding:20px}
#chain{display:flex;align-items:center;gap:4px;position:relative;flex-shrink:0}
#empty-hint{color:rgba(255,255,255,.2);font-size:.85rem;text-align:center;width:100%;padding:30px;font-style:italic;position:absolute;left:50%;transform:translateX(-50%)}

/* DROP ZONES */
.drop-zone{width:44px;height:44px;border:2px dashed rgba(245,200,66,.4);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(245,200,66,.4);font-size:1.2rem;transition:all .2s;flex-shrink:0;cursor:pointer}
.drop-zone.active{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,.1);transform:scale(1.1)}
.drop-zone:hover{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,.08)}

/* MSG BAR */
#msg-bar{padding:5px 12px;text-align:center;font-size:.78rem;font-weight:700;color:var(--gold);background:rgba(0,0,0,.3);min-height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-top:1px solid rgba(255,255,255,.04)}

/* MY HAND */
#my-zone{background:rgba(0,0,0,.3);border-top:1px solid rgba(255,255,255,.05);padding:8px;flex-shrink:0;min-height:80px}
#my-hand{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:flex-end}

/* CONTROLS */
#controls{display:flex;gap:6px;padding:7px 10px 9px;background:rgba(0,0,0,.2);flex-shrink:0}
.btn{flex:1;font-family:'Cairo',sans-serif;border:none;border-radius:9px;padding:10px 6px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;touch-action:manipulation}
#btn-draw{background:var(--card);color:var(--gold);border:1.5px solid rgba(245,200,66,.35)}
#btn-draw:hover{background:rgba(245,200,66,.15)}
#btn-draw:disabled{opacity:.3;pointer-events:none}
#btn-leave{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid rgba(255,255,255,.1);flex:0.7}

/* ===== DOMINO TILES ===== */
.tile{background:var(--ivory);border-radius:5px;border:1.5px solid #c8bfaa;box-shadow:1px 3px 7px var(--shadow);display:inline-flex;cursor:grab;transition:transform .15s,box-shadow .15s,border-color .15s,opacity .15s;position:relative;flex-shrink:0;touch-action:none}
.tile:active{cursor:grabbing}
/* Vertical tile (normal) */
.tile.V{flex-direction:column;width:32px;height:60px}
/* Horizontal tile (normal) */
.tile.H{flex-direction:row;width:60px;height:32px}
/* Double tile - always perpendicular to chain */
.tile.DBL-H{flex-direction:column;width:32px;height:60px} /* double on H chain = vertical */
.tile.DBL-V{flex-direction:row;width:60px;height:32px}  /* double on V chain = horizontal */

/* Chain tiles */
.chain-t{cursor:default;pointer-events:none}
.chain-t.H{flex-direction:row;width:52px;height:28px}
.chain-t.V{flex-direction:column;width:28px;height:52px}
.chain-t.DBL{flex-direction:column;width:28px;height:52px} /* doubles are always vertical on horizontal chain */

.tile:hover{transform:translateY(-5px);box-shadow:1px 7px 14px var(--shadow)}
.tile.sel{border-color:var(--red)!important;box-shadow:0 0 0 2.5px rgba(232,64,64,.5),1px 8px 16px var(--shadow);transform:translateY(-8px)}
.tile.dragging{opacity:.5;transform:scale(.95)}
.tile.dim{opacity:.35;cursor:not-allowed}
.tile.dim:hover{transform:none;box-shadow:1px 3px 7px var(--shadow)}

.half{flex:1;display:flex;align-items:center;justify-content:center}
.tile.V .half:first-child,.tile.DBL-H .half:first-child{border-bottom:1.5px solid #b0a090}
.tile.H .half:first-child,.tile.DBL-V .half:first-child{border-right:1.5px solid #b0a090}
.chain-t.H .half:first-child{border-right:1.5px solid #b0a090}
.chain-t.V .half:first-child,.chain-t.DBL .half:first-child{border-bottom:1.5px solid #b0a090}

/* PIPS */
.pip-grid{display:grid;width:100%;height:100%;padding:3px;gap:1px}
.pip{width:5px;height:5px;background:var(--pip);border-radius:50%;box-shadow:0 1px 1px rgba(0,0,0,.4);justify-self:center;align-self:center}
.chain-t .pip{width:4px;height:4px}
.pip-grid[data-n="0"]{grid-template:1fr/1fr}
.pip-grid[data-n="1"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="2"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="3"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="4"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="5"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}
.pip-grid[data-n="6"]{grid-template:repeat(3,1fr)/repeat(3,1fr)}

/* WIN */
#win-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center}
#win-bg.show{display:flex}
#win-box{background:linear-gradient(160deg,#1b2d3e,#0d1b2a);border:2.5px solid var(--gold);border-radius:20px;padding:34px 38px;text-align:center;max-width:320px;width:90%;box-shadow:0 0 50px rgba(245,200,66,.2);animation:winPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes winPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
#win-emoji{font-size:2.8rem;margin-bottom:6px}
#win-title{font-family:'Amiri',serif;font-size:2rem;color:var(--gold);margin-bottom:4px}
#win-sub{color:var(--muted);font-size:.88rem;margin-bottom:20px}
.win-btn{font-family:'Cairo',sans-serif;border:none;border-radius:10px;padding:11px 28px;font-size:.9rem;font-weight:800;cursor:pointer;display:block;width:100%;margin-bottom:8px;touch-action:manipulation}
.win-btn.gold{background:var(--gold);color:#000}
.win-btn.gray{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.15)}

/* SPINNER */
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* DRAG GHOST */
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;transform:translate(-50%,-50%)}

#table-scroll::-webkit-scrollbar{height:5px;width:5px}
#table-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}

@media(min-width:700px){
  #app{border-left:1px solid rgba(255,255,255,.06);border-right:1px solid rgba(255,255,255,.06)}
  body{background:#070e14}
}
</style>
</head>
<body>
<div id="app">

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <h1>🁢 دومينو</h1>
  <p class="sub">العب مع أيه حبيبتي ❤️</p>

  <div class="card">
    <h3>اسمك</h3>
    <input class="inp" id="inp-name" placeholder="اكتب اسمك" maxlength="14">
  </div>

  <div class="card">
    <h3>🆕 لعبة جديدة</h3>
    <button class="bbtn gold" id="btn-create">إنشاء غرفة</button>
    <button class="bbtn gray" id="btn-vs-ai">العب ضد الكمبيوتر 🤖</button>
    <div class="divider">— أو انضم —</div>
    <input class="inp" id="inp-code" placeholder="كود الغرفة" maxlength="6" style="text-align:center;letter-spacing:4px;font-weight:700;text-transform:uppercase">
    <button class="bbtn blue" id="btn-join">انضم للعبة</button>
  </div>
  <div id="lobby-err"></div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
  <h2>غرفة اللعب</h2>
  <p style="color:var(--muted);font-size:.82rem">ابعت الكود ده للمجموعة 📲</p>
  <div class="room-code" id="room-code-display">——</div>
  <p style="color:var(--muted);font-size:.78rem;margin-bottom:10px">اللاعبون المنضمون:</p>
  <div class="players-list" id="players-list"></div>
  <p style="color:var(--muted);font-size:.75rem;margin:8px 0">من 2 لـ 6 لاعبين — صاحب الغرفة يبدأ اللعبة</p>
  <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px">
    <button class="sbtn start" id="btn-start-game" style="display:none">▶ ابدأ اللعبة</button>
    <button class="sbtn" id="btn-copy-code">📋 نسخ الكود</button>
    <button class="sbtn danger" id="btn-cancel-wait">إلغاء</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="hdr">
    <h1>🁢 دومينو</h1>
    <div class="scores" id="scores-row"></div>
  </div>

  <div id="opps-row"></div>

  <div id="table-wrap">
    <div id="table-scroll">
      <div id="chain-container">
        <div id="chain">
          <div id="empty-hint">اسحب قطعة وضعها هنا لتبدأ 🎯</div>
        </div>
      </div>
    </div>
  </div>

  <div id="msg-bar">جاري التحميل…</div>

  <div id="my-zone">
    <div id="my-hand"></div>
  </div>

  <div id="controls">
    <button class="btn" id="btn-draw">سحب من البازل 🎲</button>
    <button class="btn" id="btn-leave">خروج 🚪</button>
  </div>
</div>

</div><!-- /app -->

<!-- WIN -->
<div id="win-bg">
  <div id="win-box">
    <div id="win-emoji">🏆</div>
    <div id="win-title">مبروك!</div>
    <div id="win-sub"></div>
    <button class="win-btn gold" id="btn-win-new">العب مرة ثانية 🔄</button>
    <button class="win-btn gray" id="btn-win-lobby">الرئيسية 🏠</button>
  </div>
</div>

<!-- DRAG GHOST -->
<div id="drag-ghost"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDP0I6KtiHFhdGhdhRKGs6EdEBpCaFfvDM",
  authDomain: "dominokimo.firebaseapp.com",
  databaseURL: "https://dominokimo-default-rtdb.firebaseio.com",
  projectId: "dominokimo",
  storageBucket: "dominokimo.firebasestorage.app",
  messagingSenderId: "808003512706",
  appId: "1:808003512706:web:4f650ac159854a1184879b"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ── PIP MAP ──────────────────────────────────────────────
const PIP_MAP={0:[],1:[5],2:[1,9],3:[1,5,9],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};

function makePips(n,small=false){
  const g=document.createElement('div');
  g.className='pip-grid'; g.dataset.n=n;
  for(let i=1;i<=9;i++){
    const c=document.createElement('div');
    if(PIP_MAP[n].includes(i)){
      const p=document.createElement('div');
      p.className='pip';
      if(small) p.style.cssText='width:3px;height:3px';
      c.appendChild(p);
    }
    g.appendChild(c);
  }
  return g;
}

function makeTileEl(a,b,cls='V',isChain=false){
  const t=document.createElement('div');
  t.className=(isChain?'tile chain-t ':'tile ')+cls;
  const h1=document.createElement('div');h1.className='half';
  const h2=document.createElement('div');h2.className='half';
  h1.appendChild(makePips(a,isChain));
  h2.appendChild(makePips(b,isChain));
  t.appendChild(h1);t.appendChild(h2);
  return t;
}

// ── GAME LOGIC ────────────────────────────────────────────
function allTiles(){
  const t=[];
  for(let a=0;a<=6;a++) for(let b=a;b<=6;b++) t.push([a,b]);
  return t;
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function isDouble(a,b){return a===b}
function canFit(a,b,end){
  if(end===-1)return true;
  return a===end||b===end;
}

// Place tile on chain, return updated state
function placeTile(chain,leftEnd,rightEnd,a,b,side){
  const newChain=[...chain];
  let nL=leftEnd,nR=rightEnd;
  const dbl=isDouble(a,b);

  if(leftEnd===-1){
    // First tile
    newChain.push({a,b,dbl});
    nL=a; nR=b;
  } else if(side==='left'){
    const flip=(b===leftEnd);
    const ta=flip?b:a, tb=flip?a:b;
    newChain.unshift({a:ta,b:tb,dbl});
    nL=dbl?leftEnd:tb; // double doesn't change the end value
    if(dbl) nL=ta; // for double, exposed end is same number
  } else {
    const flip=(a===rightEnd);
    const ta=flip?b:a, tb=flip?a:b;
    newChain.push({a:ta,b:tb,dbl});
    nR=dbl?rightEnd:tb;
    if(dbl) nR=tb;
  }
  return{chain:newChain,leftEnd:nL,rightEnd:nR};
}

function sumHand(h){return(h||[]).reduce((s,[a,b])=>s+a+b,0)}
function handCanPlay(hand,lE,rE){
  if(lE===-1)return true;
  return(hand||[]).some(([a,b])=>canFit(a,b,lE)||canFit(a,b,rE));
}

// ── STATE ─────────────────────────────────────────────────
let myId=null,myName='',roomId=null,myRole=null;
let isHost=false,vsAI=false;
let unsubRoom=null,unsubGame=null;
let lastGS=null;
let localScores={};
let dragTile=null; // {idx, el}

// ── UTILS ─────────────────────────────────────────────────
function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5},()=>c[Math.floor(Math.random()*c.length)]).join('');
}
function genId(){return Math.random().toString(36).slice(2,10)}
function lobbyErr(t){document.getElementById('lobby-err').textContent=t}
function setMsg(t){document.getElementById('msg-bar').innerHTML=t}

function showScreen(id){
  document.querySelectorAll('.screen,#game').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── RENDER CHAIN ─────────────────────────────────────────
function renderChain(gs){
  const chain=gs.chain||[];
  const el=document.getElementById('chain');
  el.innerHTML='';

  if(chain.length===0){
    el.innerHTML='<div id="empty-hint">اسحب قطعة وضعها هنا لتبدأ 🎯</div>';
    if(gs.turn===myRole&&!gs.winner) setupDropZoneEmpty(el);
    return;
  }

  const isMyTurn=gs.turn===myRole&&!gs.winner;

  // Left drop zone
  if(isMyTurn){
    const dz=makeDropZone('left');
    el.appendChild(dz);
  }

  // Chain tiles
  chain.forEach(({a,b,dbl})=>{
    const cls=dbl?'DBL':'H';
    const t=makeTileEl(a,b,cls,true);
    el.appendChild(t);
  });

  // Right drop zone
  if(isMyTurn){
    const dz=makeDropZone('right');
    el.appendChild(dz);
  }

  // Scroll to end
  setTimeout(()=>{
    const s=document.getElementById('table-scroll');
    s.scrollLeft=s.scrollWidth;
  },50);
}

function makeDropZone(side){
  const dz=document.createElement('div');
  dz.className='drop-zone';
  dz.dataset.side=side;
  dz.textContent=side==='left'?'←':'→';
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('active')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('active'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('active');if(dragTile!==null)doPlay(dragTile,side)});
  // Touch
  dz.addEventListener('touchend',()=>{if(dragTile!==null)doPlay(dragTile,side)});
  return dz;
}

function setupDropZoneEmpty(el){
  el.addEventListener('dragover',e=>e.preventDefault());
  el.addEventListener('drop',e=>{e.preventDefault();if(dragTile!==null)doPlay(dragTile,'right')});
  el.addEventListener('touchend',()=>{if(dragTile!==null)doPlay(dragTile,'right')});
}

// ── RENDER OPPONENTS ──────────────────────────────────────
function renderOpps(gs){
  const row=document.getElementById('opps-row');
  row.innerHTML='';
  const scoresRow=document.getElementById('scores-row');
  scoresRow.innerHTML='';

  const roles=gs.roles||[];
  roles.forEach(role=>{
    if(role===myRole)return;
    const name=gs.names?.[role]||role;
    const hand=gs[role+'Hand']||[];
    const sc=localScores[role]||0;
    const isT=gs.turn===role;

    // Opponent tiles visual
    const info=document.createElement('div');
    info.className='opp-info';
    const nm=document.createElement('div');
    nm.className='opp-name';
    nm.textContent=`${name} (${hand.length})${isT?' 🟢':''}`;
    const tr=document.createElement('div');
    tr.className='opp-tiles-row';
    hand.slice(0,10).forEach(()=>{
      const bt=document.createElement('div');bt.className='back-tile';tr.appendChild(bt);
    });
    info.appendChild(nm);info.appendChild(tr);
    row.appendChild(info);

    // Score box
    const sb=document.createElement('div');
    sb.className='sbox'+(isT?' myturn':'');
    sb.innerHTML=`<div class="sl">${name}</div><div class="sv">${sc}</div>`;
    scoresRow.appendChild(sb);
  });

  // My score box
  const myName2=gs.names?.[myRole]||'أنا';
  const mysc=localScores[myRole]||0;
  const isMyT=gs.turn===myRole;
  const msb=document.createElement('div');
  msb.className='sbox'+(isMyT?' myturn':'');
  msb.innerHTML=`<div class="sl">${myName2}</div><div class="sv">${mysc}</div>`;
  scoresRow.appendChild(msb);
}

// ── RENDER MY HAND ────────────────────────────────────────
function renderHand(gs){
  const myHand=gs[myRole+'Hand']||[];
  const lE=gs.leftEnd;const rE=gs.rightEnd;
  const isMyT=gs.turn===myRole&&!gs.winner;
  const el=document.getElementById('my-hand');
  el.innerHTML='';

  myHand.forEach(([a,b],i)=>{
    const canL=canFit(a,b,lE);
    const canR=canFit(a,b,rE);
    const playable=(gs.chain||[]).length===0||(isMyT&&(canL||canR));
    const t=makeTileEl(a,b,'V');
    if(!isMyT||(!playable&&(gs.chain||[]).length>0)) t.classList.add('dim');
    setupDrag(t,i,isMyT&&(playable||(gs.chain||[]).length===0));
    el.appendChild(t);
  });

  document.getElementById('btn-draw').disabled=!isMyT||gs.winner;
}

// ── DRAG & DROP ───────────────────────────────────────────
function setupDrag(el,idx,enabled){
  if(!enabled){el.draggable=false;return}
  el.draggable=true;

  // Mouse drag
  el.addEventListener('dragstart',e=>{
    dragTile=idx;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    // Highlight drop zones
    document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.add('active'));
    setTimeout(()=>el.classList.add('dragging'),0);
  });
  el.addEventListener('dragend',()=>{
    dragTile=null;
    el.classList.remove('dragging');
    document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('active'));
    document.getElementById('drag-ghost').innerHTML='';
  });

  // Touch drag
  let touchStartX=0,touchStartY=0;
  el.addEventListener('touchstart',e=>{
    const touch=e.touches[0];
    touchStartX=touch.clientX;touchStartY=touch.clientY;
    dragTile=idx;
    el.classList.add('sel');
    // Show ghost
    const ghost=document.getElementById('drag-ghost');
    ghost.innerHTML='';
    const clone=el.cloneNode(true);
    clone.style.transform='scale(1.1)';
    ghost.appendChild(clone);
    ghost.style.left=touch.clientX+'px';
    ghost.style.top=touch.clientY+'px';
  },{passive:true});

  el.addEventListener('touchmove',e=>{
    e.preventDefault();
    const touch=e.touches[0];
    const ghost=document.getElementById('drag-ghost');
    ghost.style.left=touch.clientX+'px';
    ghost.style.top=touch.clientY+'px';
    // Highlight nearest drop zone
    document.querySelectorAll('.drop-zone').forEach(dz=>{
      const r=dz.getBoundingClientRect();
      const over=touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom;
      dz.classList.toggle('active',over);
    });
    // Check empty chain
    const hint=document.getElementById('empty-hint');
    if(hint){
      const r=hint.getBoundingClientRect();
      if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
        hint.style.borderColor='var(--gold)';
      } else {hint.style.borderColor=''}
    }
  },{passive:false});

  el.addEventListener('touchend',e=>{
    e.preventDefault();
    el.classList.remove('sel');
    document.getElementById('drag-ghost').innerHTML='';
    const touch=e.changedTouches[0];
    // Find drop target
    let placed=false;
    document.querySelectorAll('.drop-zone').forEach(dz=>{
      const r=dz.getBoundingClientRect();
      if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
        doPlay(idx,dz.dataset.side);placed=true;
      }
    });
    // Check empty chain drop
    if(!placed){
      const hint=document.getElementById('empty-hint');
      if(hint){
        const r=hint.getBoundingClientRect();
        if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
          doPlay(idx,'right');placed=true;
        }
      }
    }
    dragTile=null;
    document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('active'));
  });
}

// ── PLAY TILE ─────────────────────────────────────────────
async function doPlay(idx,side){
  const gs=lastGS;
  if(!gs||gs.turn!==myRole||gs.winner)return;
  const myHand=[...(gs[myRole+'Hand']||[])];
  if(idx>=myHand.length)return;
  const [a,b]=myHand[idx];
  const lE=gs.leftEnd,rE=gs.rightEnd;

  // Validate
  if((gs.chain||[]).length>0){
    const canL=canFit(a,b,lE),canR=canFit(a,b,rE);
    if(side==='left'&&!canL)return;
    if(side==='right'&&!canR)return;
    if(!canL&&!canR)return;
  }

  myHand.splice(idx,1);
  const res=placeTile(gs.chain||[],lE,rE,a,b,side);

  // Find next turn
  const roles=gs.roles||[];
  const myIdx=roles.indexOf(myRole);
  let nextRole=null;
  // Try to find next player who can play
  for(let i=1;i<=roles.length;i++){
    const nr=roles[(myIdx+i)%roles.length];
    const nh=gs[nr+'Hand']||[];
    if(nr===myRole) continue;
    if(handCanPlay(nh,res.leftEnd,res.rightEnd)||gs.boneyard?.length>0){
      nextRole=nr;break;
    }
  }
  if(!nextRole) nextRole=roles[(myIdx+1)%roles.length];

  // Check win
  let winner=null;
  if(myHand.length===0){winner=myRole}
  else{
    // Check blocked
    const allBlocked=roles.every(r=>{
      const h=r===myRole?myHand:(gs[r+'Hand']||[]);
      return !handCanPlay(h,res.leftEnd,res.rightEnd);
    });
    if(allBlocked&&(!gs.boneyard||gs.boneyard.length===0)){
      // Find player with least pips
      let minSum=Infinity;
      roles.forEach(r=>{
        const h=r===myRole?myHand:(gs[r+'Hand']||[]);
        const s=sumHand(h);
        if(s<minSum){minSum=s;winner=r}
      });
    }
  }

  const updates={
    [`rooms/${roomId}/game/${myRole}Hand`]:myHand,
    [`rooms/${roomId}/game/chain`]:res.chain,
    [`rooms/${roomId}/game/leftEnd`]:res.leftEnd,
    [`rooms/${roomId}/game/rightEnd`]:res.rightEnd,
    [`rooms/${roomId}/game/turn`]:winner?myRole:nextRole,
  };
  if(winner)updates[`rooms/${roomId}/game/winner`]=winner;
  await update(ref(db),updates);

  if(vsAI&&!winner&&nextRole&&nextRole!==myRole){
    setTimeout(()=>runAI(nextRole),800);
  }
}

// ── AI TURN ───────────────────────────────────────────────
async function runAI(role){
  const gs=lastGS;
  if(!gs||gs.winner||gs.turn!==role)return;
  let hand=[...(gs[role+'Hand']||[])];
  let boneyard=[...(gs.boneyard||[])];
  let chain=[...(gs.chain||[])];
  let lE=gs.leftEnd,rE=gs.rightEnd;
  let roles=gs.roles||[];

  // Draw until can play
  while(!handCanPlay(hand,lE,rE)&&boneyard.length>0){
    hand.push(boneyard.pop());
  }

  let played=false;
  if(handCanPlay(hand,lE,rE)){
    // Find best tile
    let bestIdx=-1,bestSide='right',bestScore=-1;
    hand.forEach(([a,b],i)=>{
      const cL=canFit(a,b,lE),cR=canFit(a,b,rE);
      if(!cL&&!cR&&chain.length>0)return;
      const sc=(a===b?100:0)+a+b;
      if(sc>bestScore){bestScore=sc;bestIdx=i;bestSide=cR?'right':'left'}
    });
    if(bestIdx!==-1){
      const [a,b]=hand[bestIdx];
      hand.splice(bestIdx,1);
      const res=placeTile(chain,lE,rE,a,b,bestSide);
      chain=res.chain;lE=res.leftEnd;rE=res.rightEnd;
      played=true;

      // Next role
      const myIdx=roles.indexOf(role);
      let nextRole=roles[(myIdx+1)%roles.length];

      let winner=null;
      if(hand.length===0)winner=role;

      const updates={
        [`rooms/${roomId}/game/${role}Hand`]:hand,
        [`rooms/${roomId}/game/boneyard`]:boneyard,
        [`rooms/${roomId}/game/chain`]:chain,
        [`rooms/${roomId}/game/leftEnd`]:lE,
        [`rooms/${roomId}/game/rightEnd`]:rE,
        [`rooms/${roomId}/game/turn`]:winner?role:nextRole,
      };
      if(winner)updates[`rooms/${roomId}/game/winner`]=winner;
      await update(ref(db),updates);

      if(!winner&&nextRole&&nextRole!==myRole){
        setTimeout(()=>runAI(nextRole),800);
      }
    }
  }

  if(!played){
    // Pass
    const myIdx=roles.indexOf(role);
    const nextRole=roles[(myIdx+1)%roles.length];
    const updates={
      [`rooms/${roomId}/game/${role}Hand`]:hand,
      [`rooms/${roomId}/game/boneyard`]:boneyard,
      [`rooms/${roomId}/game/turn`]:nextRole,
    };
    await update(ref(db),updates);
    if(nextRole!==myRole)setTimeout(()=>runAI(nextRole),600);
  }
}

// ── DRAW ─────────────────────────────────────────────────
async function onDraw(){
  const gs=lastGS;
  if(!gs||gs.turn!==myRole||gs.winner)return;
  const boneyard=[...(gs.boneyard||[])];
  if(boneyard.length<=2){setMsg('البازل شارف على النهاية 😅');return}
  const myHand=[...(gs[myRole+'Hand']||[])];
  myHand.push(boneyard.pop());
  await update(ref(db),{
    [`rooms/${roomId}/game/${myRole}Hand`]:myHand,
    [`rooms/${roomId}/game/boneyard`]:boneyard,
  });
}

// ── APPLY STATE ───────────────────────────────────────────
function applyGameState(gs){
  lastGS=gs;
  if(!gs)return;
  const isMyT=gs.turn===myRole&&!gs.winner;

  renderChain(gs);
  renderOpps(gs);
  renderHand(gs);

  document.getElementById('btn-draw').disabled=!isMyT;

  if(gs.winner){
    endGame(gs.winner,gs.names);return;
  }

  if(isMyT){
    const myHand=gs[myRole+'Hand']||[];
    if(!handCanPlay(myHand,gs.leftEnd,gs.rightEnd)&&(gs.boneyard||[]).length<=2){
      setMsg('مش قادر تلعب — هيتمرر دورك تلقائياً…');
      setTimeout(async()=>{
        const roles=gs.roles||[];
        const myIdx=roles.indexOf(myRole);
        const nextRole=roles[(myIdx+1)%roles.length];
        await update(ref(db),{[`rooms/${roomId}/game/turn`]:nextRole});
      },1200);
    } else {
      setMsg('🟢 دورك — اسحب قطعة وضعها في الطرف المناسب!');
    }
  } else {
    const turnName=gs.names?.[gs.turn]||gs.turn;
    setMsg(`<span class="spin"></span> دور ${turnName}…`);
  }
}

// ── END GAME ─────────────────────────────────────────────
function endGame(winner,names){
  const iWon=winner===myRole;
  if(!localScores[winner])localScores[winner]=0;
  localScores[winner]++;
  document.getElementById('win-emoji').textContent=iWon?'🏆':'😅';
  document.getElementById('win-title').textContent=iWon?'مبروك كسبت! 🎉':`${names?.[winner]||winner} كسب!`;
  document.getElementById('win-sub').textContent=iWon?'أحسنت! 🌟':'حاول مرة تانية 💪';
  document.getElementById('win-bg').classList.add('show');
}

// ── CREATE GAME STATE ─────────────────────────────────────
function createGameState(playersMap,botRoles=[]){
  const tiles=shuffle(allTiles());
  const roles=Object.keys(playersMap);
  const n=roles.length;
  const tilesPerPlayer=n<=3?7:5;
  const hands={};
  roles.forEach(r=>{hands[r+'Hand']=tiles.splice(0,tilesPerPlayer)});
  // Find who has highest double or highest tile
  let firstRole=roles[0];
  let maxVal=-1;
  roles.forEach(r=>{
    hands[r+'Hand'].forEach(([a,b])=>{
      if(a===b&&a>maxVal){maxVal=a;firstRole=r}
    });
  });
  return{
    roles,names:playersMap,hands:null,
    ...Object.fromEntries(roles.map(r=>[r+'Hand',hands[r+'Hand']])),
    boneyard:tiles,
    chain:[],leftEnd:-1,rightEnd:-1,
    turn:firstRole,winner:null,
    botRoles,
  };
}

// ── LISTEN ───────────────────────────────────────────────
function listenGame(rid){
  if(unsubGame)unsubGame();
  unsubGame=onValue(ref(db,`rooms/${rid}/game`),(snap)=>{
    applyGameState(snap.val());
  });
}

function listenRoom(rid){
  if(unsubRoom)unsubRoom();
  unsubRoom=onValue(ref(db,`rooms/${rid}`),(snap)=>{
    const r=snap.val();
    if(!r)return;
    // Update players list
    const pl=document.getElementById('players-list');
    if(pl){
      pl.innerHTML='';
      Object.entries(r.players||{}).forEach(([role,name])=>{
        const c=document.createElement('div');
        c.className='player-chip'+(role===myRole?' me':'');
        c.textContent=name+(role===myRole?' (أنت)':'');
        pl.appendChild(c);
      });
    }
    const count=Object.keys(r.players||{}).length;
    const startBtn=document.getElementById('btn-start-game');
    if(startBtn&&isHost) startBtn.style.display=count>=2?'':'none';

    if(r.status==='playing'){
      showScreen('game');
      listenGame(rid);
    }
  });
}

// ── CREATE ROOM ───────────────────────────────────────────
async function createRoom(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){lobbyErr('اكتب اسمك');return}
  myName=name;myId=genId();myRole='p1';isHost=true;vsAI=false;
  roomId=genCode();lobbyErr('');

  await set(ref(db,`rooms/${roomId}`),{
    hostId:myId,status:'waiting',
    players:{p1:name},
    created:Date.now()
  });

  document.getElementById('room-code-display').textContent=roomId;
  document.getElementById('btn-start-game').style.display='none';
  showScreen('waiting');
  listenRoom(roomId);
}

// ── VS AI ─────────────────────────────────────────────────
async function startVsAI(){
  const name=document.getElementById('inp-name').value.trim()||'لاعب';
  myName=name;myId=genId();myRole='p1';isHost=true;vsAI=true;
  roomId=genCode();
  const playersMap={p1:name,p2:'🤖 كمبيوتر'};
  const gs=createGameState(playersMap,['p2']);
  await set(ref(db,`rooms/${roomId}`),{
    hostId:myId,status:'playing',
    players:playersMap,
    created:Date.now()
  });
  await set(ref(db,`rooms/${roomId}/game`),gs);
  showScreen('game');
  listenGame(roomId);
  // If AI goes first
  setTimeout(()=>{if(lastGS?.turn!==myRole)runAI(lastGS?.turn)},1000);
}

// ── JOIN ROOM ─────────────────────────────────────────────
async function joinRoom(){
  const name=document.getElementById('inp-name').value.trim();
  const code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(!name){lobbyErr('اكتب اسمك');return}
  if(!code||code.length<4){lobbyErr('اكتب كود الغرفة');return}
  myName=name;myId=genId();isHost=false;vsAI=false;
  roomId=code;lobbyErr('');

  const snap=await get(ref(db,`rooms/${code}`));
  if(!snap.exists()){lobbyErr('الغرفة مش موجودة ❌');return}
  const r=snap.val();
  if(r.status!=='waiting'){lobbyErr('اللعبة بدأت بالفعل ❌');return}
  const players=r.players||{};
  const count=Object.keys(players).length;
  if(count>=6){lobbyErr('الغرفة ممتلئة (6 لاعبين) ❌');return}

  myRole='p'+(count+1);
  players[myRole]=name;
  await update(ref(db,`rooms/${code}`),{players});

  document.getElementById('room-code-display').textContent=code;
  showScreen('waiting');
  listenRoom(code);
}

// ── START GAME (host) ─────────────────────────────────────
async function startGame(){
  const snap=await get(ref(db,`rooms/${roomId}`));
  const r=snap.val();
  if(!r)return;
  const players=r.players||{};
  if(Object.keys(players).length<2){alert('محتاج لاعبين على الأقل!');return}
  const gs=createGameState(players,[]);
  await update(ref(db,`rooms/${roomId}`),{status:'playing'});
  await set(ref(db,`rooms/${roomId}/game`),gs);
}

// ── LEAVE ─────────────────────────────────────────────────
function leaveGame(){
  if(unsubGame){unsubGame();unsubGame=null}
  if(unsubRoom){unsubRoom();unsubRoom=null}
  if(roomId&&isHost)remove(ref(db,`rooms/${roomId}`));
  roomId=null;myRole=null;lastGS=null;dragTile=null;
  localScores={};vsAI=false;isHost=false;
  document.getElementById('win-bg').classList.remove('show');
  showScreen('lobby');
}

// ── NEW GAME (host restarts) ──────────────────────────────
async function newGame(){
  document.getElementById('win-bg').classList.remove('show');
  if(!isHost){setMsg('بس صاحب الغرفة يقدر يبدأ لعبة جديدة');return}
  const snap=await get(ref(db,`rooms/${roomId}`));
  const r=snap.val();
  if(!r)return;
  const gs=createGameState(r.players||{},lastGS?.botRoles||[]);
  await set(ref(db,`rooms/${roomId}/game`),gs);
  if(vsAI) setTimeout(()=>{if(lastGS?.turn!==myRole)runAI(lastGS?.turn)},1000);
}

// ── EVENTS ───────────────────────────────────────────────
document.getElementById('btn-create').addEventListener('click',createRoom);
document.getElementById('btn-vs-ai').addEventListener('click',startVsAI);
document.getElementById('btn-join').addEventListener('click',joinRoom);
document.getElementById('inp-code').addEventListener('keyup',e=>{if(e.key==='Enter')joinRoom()});
document.getElementById('btn-start-game').addEventListener('click',startGame);
document.getElementById('btn-cancel-wait').addEventListener('click',()=>{
  if(unsubRoom){unsubRoom();unsubRoom=null}
  if(roomId&&isHost)remove(ref(db,`rooms/${roomId}`));
  roomId=null;showScreen('lobby');
});
document.getElementById('btn-copy-code').addEventListener('click',()=>{
  const code=document.getElementById('room-code-display').textContent;
  navigator.clipboard?.writeText(code).then(()=>{
    document.getElementById('btn-copy-code').textContent='✅ اتنسخ!';
    setTimeout(()=>document.getElementById('btn-copy-code').textContent='📋 نسخ الكود',2000);
  });
});
document.getElementById('btn-draw').addEventListener('click',onDraw);
document.getElementById('btn-leave').addEventListener('click',leaveGame);
document.getElementById('btn-win-new').addEventListener('click',newGame);
document.getElementById('btn-win-lobby').addEventListener('click',leaveGame);

// Prevent page drag
document.addEventListener('dragover',e=>e.preventDefault());
</script>
